    // Duraciones de cada tramo del circuito (segundos), rellenado cuando carga la ruta: [Hotel→T1, T1→T2, T2→T4, T4→Hotel]
    let routeLegDurationsSec = null;
    /** Resultado Directions del circuito cerrado (para reaplicar si hace falta). */
    let circuitDirectionsResult = null;
    /** Si la petición del circuito cerrado a Directions falla (clave API, cuota, etc.). */
    let circuitDirectionsRequestFailed = false;
    /** Duración T4→hotel (petición directa). El último tramo del circuito cerrado a veces no coincide con la llegada real al Axor. */
    let routeT4ToHotelDriveSec = null;
    /** Hotel → IFEMA (primer tramo del circuito IFEMA). Simuladores: tramo directo. */
    let routeHotelToIfemaDriveSec = null;
    let routeHotelToSimuladoresDriveSec = null;
    const PARADA_TERMINAL_MIN = 0;
    // Ruta: Hotel → T1 → T2 → T4 → Hotel (4 tramos, 4 paradas + hotel)
    const ROUTE_STOP_NAMES = ["T1", "T2", "T4", "Hotel"];
    const MADRID_TZ = "Europe/Madrid";

    function getHotelReturnFromT4DriveSeconds() {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return 0;
      const circuit = routeLegDurationsSec[3];
      if (routeT4ToHotelDriveSec == null) return circuit;
      return Math.max(circuit, routeT4ToHotelDriveSec);
    }

    function fetchRouteT4ToHotelDrive(directionsService, onDone) {
      if (!directionsService || !TERMINALES || TERMINALES.length < 3) {
        if (typeof onDone === "function") onDone();
        return;
      }
      const t4 = TERMINALES[2];
      directionsService.route({
        origin: { lat: t4.lat, lng: t4.lng },
        destination: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK && result.routes[0] && result.routes[0].legs[0]) {
          routeT4ToHotelDriveSec = result.routes[0].legs[0].duration.value;
        }
        if (typeof onDone === "function") onDone();
      });
    }

    function isExtraordinaryDestinationKey(key) {
      const k = key ? String(key).toLowerCase() : "";
      return k === "ifema" || k === "simuladores";
    }

    function isOrchestratedCircuitDestinationKey(key) {
      const k = key ? String(key).toLowerCase() : "";
      return k === "t1" || k === "t2" || k === "t4";
    }

    function getExtraordinaryStopName(destKey) {
      return LOCATION_TO_ROUTE_STOP[String(destKey).toLowerCase()] || null;
    }

    function getHotelExtraordinaryDriveSeconds(destKey) {
      const k = String(destKey).toLowerCase();
      if (k === "ifema") return routeHotelToIfemaDriveSec;
      if (k === "simuladores") return routeHotelToSimuladoresDriveSec;
      return null;
    }

    function fetchRouteHotelIfemaCircuit(directionsService, onDone) {
      if (!directionsService) {
        if (typeof onDone === "function") onDone();
        return;
      }
      directionsService.route({
        origin: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        destination: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        waypoints: [{ location: { lat: IFEMA.lat, lng: IFEMA.lng }, stopover: true }],
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK && result.routes[0]) {
          ifemaCircuitDirectionsResult = result;
          ifemaLegDurationsSec = result.routes[0].legs.map(function(leg) { return leg.duration.value; });
          if (ifemaLegDurationsSec.length >= 1) routeHotelToIfemaDriveSec = ifemaLegDurationsSec[0];
          if (map && ifemaDirectionsRenderer) {
            ifemaDirectionsRenderer.setMap(map);
            ifemaDirectionsRenderer.setDirections(result);
          }
          applyIfemaPolylineStyle();
        }
        if (typeof onDone === "function") onDone();
      });
    }

    function fetchRouteHotelExtraordinaryDrives(directionsService, onDone) {
      if (!directionsService) {
        if (typeof onDone === "function") onDone();
        return;
      }
      directionsService.route({
        origin: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        destination: { lat: SIMULADORES.lat, lng: SIMULADORES.lng },
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK && result.routes[0] && result.routes[0].legs[0]) {
          routeHotelToSimuladoresDriveSec = result.routes[0].legs[0].duration.value;
        }
        if (typeof onDone === "function") onDone();
      });
    }

    function getDestinationStopName() {
      const key = getEffectiveTripDestinationKey();
      if (!key) return null;
      return LOCATION_TO_ROUTE_STOP[key] || null;
    }

    function computeEtaSecondsToStop(currentLeg, remainingOnLegSec, departureWaitSec, stopName) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return null;
      const targetIdx = ROUTE_STOP_NAMES.indexOf(stopName);
      if (targetIdx < 0) return null;
      const start = currentLeg < 0 ? 0 : currentLeg;
      if (targetIdx < start) return null;
      let sec = departureWaitSec || 0;
      if (currentLeg < 0) {
        if (targetIdx === 3) {
          const h = getHotelArrivalSecOrchestratedFromHotel(departureWaitSec);
          return h == null ? null : h;
        } else {
          for (let i = 0; i <= targetIdx; i++) sec += routeLegDurationsSec[i];
          sec += targetIdx * PARADA_TERMINAL_MIN * 60;
        }
      } else {
        sec += remainingOnLegSec;
        for (let i = currentLeg + 1; i <= targetIdx; i++) sec += routeLegDurationsSec[i];
        sec += (targetIdx - currentLeg) * PARADA_TERMINAL_MIN * 60;
      }
      return sec;
    }

    function getStopEtaSecondsRemaining(meta, stopName) {
      if (!meta) return null;
      if ((stopName === "IFEMA" || stopName === "Simuladores") && Number.isFinite(meta.pickupRouteTotalSec)) {
        const elapsed = (Date.now() - (meta.pickupRouteAt || Date.now())) / 1000;
        return Math.max(0, meta.pickupRouteTotalSec - elapsed);
      }
      let baseSec = null;
      if (meta.stopEtas && meta.stopEtas.length) {
        const hit = meta.stopEtas.find(function(stop) { return stop.name === stopName; });
        if (hit) baseSec = hit.sec;
      }
      if (baseSec === null && meta.routeEtaContext) {
        baseSec = computeEtaSecondsToStop(
          meta.routeEtaContext.currentLeg,
          meta.routeEtaContext.remainingOnLegSec,
          meta.routeEtaContext.departureWaitSec,
          stopName
        );
      }
      if (baseSec === null) return null;
      const elapsed = (Date.now() - (meta.stopEtasAt || Date.now())) / 1000;
      return Math.max(0, baseSec - elapsed);
    }

    /**
     * ETA en segundos desde ahora para un pasajero en el hotel hacia destKey,
     * desde la próxima ranura combinada :00 / :30 (hora Madrid).
     */
    function computeHotelPassengerEtaSec(destKey) {
      if (isExtraordinaryDestinationKey(destKey)) {
        const drive = getHotelExtraordinaryDriveSeconds(destKey);
        return drive == null ? null : drive;
      }
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return null;
      const destIndex = locationKeyToStopIndex(destKey);
      if (destIndex === null || destIndex === 3) return null;
      const depSec = getNextHotelOrchestratedDepartureInfo().secondsUntil;
      const parSec = PARADA_TERMINAL_MIN * 60;
      let travelSec = 0;
      for (let i = 0; i <= destIndex; i++) travelSec += routeLegDurationsSec[i];
      travelSec += destIndex * parSec;
      return depSec + travelSec;
    }

    function updateLegendCompact() {
      if (!legendCompactEl) return;
      if (circuitDirectionsRequestFailed && (!routeLegDurationsSec || routeLegDurationsSec.length !== 4)) {
        legendCompactEl.textContent =
          "No se pudo calcular la ruta del mapa. Revisa la clave de Google Maps o recarga la página.";
        return;
      }
      paintActiveVehicleRowOrchestratedHotelEtas();
      paintActiveVehicleExtraordinaryEta();
      const vehicleId = activeVehicleIdOnMap;

      // Pasajero en el hotel: ETA desde próxima salida del circuito, no desde posición del vehículo
      if (selectedLocation === "hotel" && tripDestination) {
        const destKey = String(tripDestination).toLowerCase();
        const destLabel = DESTINATION_LABELS[destKey] || tripDestination;
        if (isExtraordinaryDestinationKey(destKey)) {
          const destStopName = getExtraordinaryStopName(destKey);
          if (vehicleId && destStopName) {
            const meta = vehicleMeta[vehicleId] || {};
            const remaining = getStopEtaSecondsRemaining(meta, destStopName);
            if (remaining !== null) {
              const vehicleLabel = meta.label || vehicleId;
              legendCompactEl.textContent = vehicleLabel + " · " + destLabel + " en " + formatMinutesDelta(remaining);
              return;
            }
          }
          const etaSec = computeHotelPassengerEtaSec(destKey);
          if (etaSec === null) {
            legendCompactEl.textContent = "Calculando…";
            return;
          }
          legendCompactEl.textContent = destLabel + " en " + formatMinutesDelta(etaSec);
          return;
        }
        if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) {
          legendCompactEl.textContent = "Calculando ruta…";
          return;
        }
        const dep = getNextHotelOrchestratedDepartureInfo();
        const etaSec = computeHotelPassengerEtaSec(tripDestination);
        if (etaSec === null) {
          legendCompactEl.textContent = "Calculando…";
          return;
        }
        const depLabel = dep.imminent
          ? "Salida inminente desde el hotel"
          : "Salida a las " + dep.time + " desde el hotel";
        legendCompactEl.textContent = depLabel + " · " + destLabel + " en " + formatMinutesDelta(etaSec);
        return;
      }

      const destination = getDestinationStopName();
      if (!destination) {
        legendCompactEl.textContent = "Apúntate para ver tu llegada";
        return;
      }
      if (!vehicleId) {
        legendCompactEl.textContent =
          "Ruta en mapa · aún no hay vehículo asignado; se mostrará en cuanto un conductor active el transfer.";
        return;
      }
      const meta = vehicleMeta[vehicleId] || {};
      const remaining = getStopEtaSecondsRemaining(meta, destination);
      if (remaining === null) {
        legendCompactEl.textContent = "Calculando…";
        return;
      }
      const baseLabel = SIGNUP_LABELS[selectedLocation] || selectedLocation;
      const vehicleLabel = meta.label || vehicleId;
      legendCompactEl.textContent = vehicleLabel + " · " + baseLabel + " en " + formatMinutesDelta(remaining);
    }

    setInterval(updateLegendCompact, 30000);

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Última posición con la que pedimos ETA a Google (para no abusar de la API)
    const lastEtaOrigin = {};
    const ETA_THROTTLE_KM = 0.3;

    /** Metadatos por vehículo (viene del servidor; ver server.js). */
    var vehicleServiceById = {};

    function getVehicleService(vehicleId) {
      var s = vehicleServiceById[vehicleId];
      if (s && s.serviceMode) return s;
      return { serviceMode: "circuit", circuitSchedule: "A" };
    }

    /**
     * Ranuras :00 y :30 (Madrid): próxima salida del circuito desde el hotel (Campezo 4).
     * Tiempos de tramo por Google; T4→hotel usa routeT4ToHotelDriveSec cuando aplica.
     */
    function madridSecondsSinceMidnight(date) {
      const parts = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(date || new Date());
      const pick = function(type) {
        return parseInt(parts.find(function(p) { return p.type === type; }).value, 10);
      };
      return pick("hour") * 3600 + pick("minute") * 60 + pick("second");
    }

    /** Próximo instante ≥ epochMs cuya hora Madrid cae en :00 o :30. */
    function snapUpToNextHalfHourMadrid(epochMs) {
      const s = madridSecondsSinceMidnight(new Date(epochMs));
      const boundarySec = Math.ceil(s / 1800) * 1800;
      return epochMs + (boundarySec - s) * 1000;
    }

    /**
     * Circuito desde hotel (currentLeg &lt; 0): segundos hasta llegada al hotel tras T4.
     * En T4 el vehículo no sale hacia el Axor antes de (salida del hotel + 30 min) ni antes de
     * haber llegado a T4; la salida efectiva se alinea a ranura :00/:30 Madrid.
     */
    function getHotelArrivalSecOrchestratedFromHotel(departureWaitSec) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return null;
      const depWait = departureWaitSec || 0;
      const parSec = PARADA_TERMINAL_MIN * 60;
      let t4ArriveSec = depWait;
      for (let i = 0; i <= 2; i++) t4ArriveSec += routeLegDurationsSec[i];
      t4ArriveSec += 2 * parSec;
      const t4ArriveMs = Date.now() + t4ArriveSec * 1000;
      const hotelDepartMs = Date.now() + depWait * 1000;
      const minT4DepartMs = hotelDepartMs + 30 * 60 * 1000;
      const t4DepartMs = snapUpToNextHalfHourMadrid(Math.max(t4ArriveMs, minT4DepartMs));
      const driveSec = getHotelReturnFromT4DriveSeconds();
      return Math.max(0, (t4DepartMs - Date.now()) / 1000) + driveSec;
    }

    function getNextHotelOrchestratedDepartureInfo() {
      const now = Date.now();
      const s = madridSecondsSinceMidnight(new Date(now));
      const boundarySec = Math.ceil(s / 1800) * 1800;
      const deltaSec = Math.max(0, boundarySec - s);
      const imminent = deltaSec === 0;
      const nextInstant = new Date(now + deltaSec * 1000);
      const p = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(nextInstant);
      const pick = function(type) {
        return parseInt(p.find(function(x) { return x.type === type; }).value, 10);
      };
      const h = pick("hour");
      const m = pick("minute");
      return {
        imminent: imminent,
        time: pad2(h) + ":" + pad2(m),
        secondsUntil: deltaSec
      };
    }

    /** El parámetro schedule se ignora: la ranura combina ambos circuitos (:00 y :30). */
    function getHotelDepartureDisplayCircuit(schedule) {
      const o = getNextHotelOrchestratedDepartureInfo();
      return { imminent: o.imminent, time: o.time };
    }

    function getSecondsUntilHotelDepartureCircuit(schedule) {
      return getNextHotelOrchestratedDepartureInfo().secondsUntil;
    }

    function pad2(n) {
      return (n < 10 ? "0" : "") + n;
    }

    function madridClockParts(date) {
      const parts = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date || new Date());
      const pick = function(type) {
        return parseInt(parts.find(function(p) { return p.type === type; }).value, 10);
      };
      return { hour: pick("hour"), minute: pick("minute") };
    }

    function formatArrivalTimeMadrid(secondsFromNow) {
      return new Date(Date.now() + secondsFromNow * 1000).toLocaleTimeString("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function locationKeyToStopIndex(locationKey) {
      if (locationKey === "hotel") return 3;
      const indexByLocation = { t1: 0, t2: 1, t4: 2 };
      return indexByLocation[locationKey] !== undefined ? indexByLocation[locationKey] : null;
    }

    function getStopLatLng(stopIndex) {
      if (stopIndex === 3) return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
      return { lat: TERMINALES[stopIndex].lat, lng: TERMINALES[stopIndex].lng };
    }

    function getSignupDestinationPosition() {
      if (!signedUp || !selectedLocation) return null;
      const key = getEffectiveTripDestinationKey();
      if (!key) return null;
      if (key === "ifema") return { lat: IFEMA.lat, lng: IFEMA.lng };
      if (key === "simuladores") return { lat: SIMULADORES.lat, lng: SIMULADORES.lng };
      const stopIndex = locationKeyToStopIndex(key);
      if (stopIndex === null) return null;
      return getStopLatLng(stopIndex);
    }

    /** Punto de espera del pasajero (origen de la ruta previa en mapa). */
    function getPassengerSignupOriginLatLng() {
      if (!selectedLocation) return null;
      if (selectedLocation === "hotel") return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
      const idx = locationKeyToStopIndex(selectedLocation);
      if (idx === null || idx === 3) return null;
      return { lat: TERMINALES[idx].lat, lng: TERMINALES[idx].lng };
    }

    /** Destino del viaje elegido (tripDestination). */
    function getPassengerTripEndLatLng() {
      if (!tripDestination) return null;
      const key = String(tripDestination).toLowerCase();
      if (key === "ifema") return { lat: IFEMA.lat, lng: IFEMA.lng };
      if (key === "simuladores") return { lat: SIMULADORES.lat, lng: SIMULADORES.lng };
      const stopIndex = locationKeyToStopIndex(key);
      if (stopIndex === null) return null;
      return getStopLatLng(stopIndex);
    }

    function hasSignupDestinationReady() {
      if (!signedUp || !selectedLocation || !tripDestination) return false;
      return true;
    }

    var trackingFitTimer = null;
    const TRACKING_FIT_MS = 3000;
    var followUserAndVehicle = true;
    var mapMoveFromCode = false;

    function fitUserAndVehicleViewport() {
      if (!map || !followUserAndVehicle) return;
      if (!hasSignupDestinationReady() || !activeVehicleIdOnMap || !lastActiveVehicleEta) return;
      const waitPt = getPassengerSignupOriginLatLng();
      const destPt = getPassengerTripEndLatLng();
      if (!waitPt) return;
      const veh = lastActiveVehicleEta;
      const bounds = new google.maps.LatLngBounds();
      if (lastPassengerTripDirectionsResult) {
        extendBoundsFromDirectionsResult(bounds, lastPassengerTripDirectionsResult);
      }
      if (lastPickupDirectionsResult) {
        extendBoundsFromDirectionsResult(bounds, lastPickupDirectionsResult);
      }
      bounds.extend(waitPt);
      if (destPt) bounds.extend(destPt);
      bounds.extend({ lat: veh.lat, lng: veh.lng });
      mapMoveFromCode = true;
      map.fitBounds(bounds, getTrackingViewportPadding());
      google.maps.event.addListenerOnce(map, "idle", function() {
        mapMoveFromCode = false;
      });
    }

    function onMapUserGesture() {
      if (mapMoveFromCode || !map) return;
      if (!hasSignupDestinationReady() || !activeVehicleIdOnMap || !lastActiveVehicleEta) return;
      followUserAndVehicle = false;
      stopTrackingFitLoop();
    }

    /**
     * Padding para fitBounds dentro del div #map únicamente.
     * Cabecera y “¿Dónde esperas?” están FUERA del mapa (hermanos arriba de .map-container);
     * si sumamos su altura aquí, Google Maps reserva banda vacía enorme arriba y casi no hace zoom in.
     * Abajo sí hace falta la altura del lid/leyenda porque flota encima del mapa.
     */
    function getMapChromePadding() {
      const legend = document.getElementById("legend");
      const legendToggle = document.getElementById("legendToggle");
      const edge = 8;
      var bottomPad = 72;
      if (legend) {
        bottomPad = legend.classList.contains("legend-sheet-expanded")
          ? legend.offsetHeight
          : (legendToggle ? legendToggle.offsetHeight : legend.offsetHeight);
      }
      return {
        top: edge,
        right: edge,
        bottom: bottomPad + edge,
        left: edge
      };
    }

    function getTrackingViewportPadding() {
      return getMapChromePadding();
    }

    function updateTrackingFitLoop() {
      if (trackingFitTimer) {
        clearInterval(trackingFitTimer);
        trackingFitTimer = null;
      }
      if (!hasSignupDestinationReady() || !activeVehicleIdOnMap || !lastActiveVehicleEta) return;
      if (!followUserAndVehicle) return;
      fitUserAndVehicleViewport();
      trackingFitTimer = setInterval(function() {
        if (followUserAndVehicle) fitUserAndVehicleViewport();
      }, TRACKING_FIT_MS);
    }

    function stopTrackingFitLoop() {
      if (trackingFitTimer) {
        clearInterval(trackingFitTimer);
        trackingFitTimer = null;
      }
    }

    // Circuito: Hotel(idx -1) → T1(0) → T2(1) → T4(2) → Hotel(3)
    function buildCircuitWaypoints(currentLeg, destinationStopIndex) {
      const waypoints = [];
      if (currentLeg < 0) {
        for (let i = 0; i < destinationStopIndex; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
        return waypoints;
      }
      if (destinationStopIndex > currentLeg) {
        for (let i = currentLeg; i < destinationStopIndex; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
        return waypoints;
      }
      if (destinationStopIndex < currentLeg) {
        for (let i = currentLeg; i <= 3; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
        for (let i = 0; i < destinationStopIndex; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
      }
      return waypoints;
    }

    /**
     * Ruta de portada sin conductor: siempre el recorrido del circuito desde el hotel
     * (Hotel → T1 → T2 → … hasta la parada de espera), no un tramo directo tipo Hotel→T4.
     * Desde hotel con destino IFEMA: circuito alternativo Hotel → IFEMA → Hotel.
     * Simuladores: tramo directo.
     */
    function buildWaypointsBetweenStops(fromIdx, toIdx) {
      const waypoints = [];
      for (let i = fromIdx + 1; i < toIdx; i++) {
        waypoints.push({ location: getStopLatLng(i), stopover: true });
      }
      return waypoints;
    }

    function getPassengerPortadaRouteRequest() {
      if (!selectedLocation || !tripDestination) return null;
      const hotelLl = { lat: CAMPEZO.lat, lng: CAMPEZO.lng };

      if (selectedLocation === "hotel") {
        const k = String(tripDestination).toLowerCase();
        if (k === "ifema") {
          return {
            origin: hotelLl,
            destination: hotelLl,
            waypoints: [{ location: { lat: IFEMA.lat, lng: IFEMA.lng }, stopover: true }]
          };
        }
        if (k === "simuladores") {
          return { origin: hotelLl, destination: { lat: SIMULADORES.lat, lng: SIMULADORES.lng }, waypoints: null };
        }
        const stopIdx = locationKeyToStopIndex(k);
        if (stopIdx === null || stopIdx === 3) return null;
        return {
          origin: hotelLl,
          destination: getStopLatLng(stopIdx),
          waypoints: buildCircuitWaypoints(-1, stopIdx)
        };
      }

      const waitIdx = locationKeyToStopIndex(selectedLocation);
      if (waitIdx === null || waitIdx === 3) return null;
      const destK = String(tripDestination).toLowerCase();
      if (destK === "hotel") {
        return {
          origin: getStopLatLng(waitIdx),
          destination: hotelLl,
          waypoints: null
        };
      }
      const destIdx = locationKeyToStopIndex(destK);
      if (destIdx === null || destIdx === 3) return null;
      return {
        origin: getStopLatLng(waitIdx),
        destination: getStopLatLng(destIdx),
        waypoints: buildWaypointsBetweenStops(waitIdx, destIdx)
      };
    }

    function clearPassengerTripRoute() {
      passengerDirectPreviewActive = false;
      lastPassengerPreviewSnap = null;
      if (passengerTripDirectionsRenderer) passengerTripDirectionsRenderer.setMap(null);
      lastPassengerTripDirectionsResult = null;
      applyCircuitPolylineStyle();
    }

    function clearVehiclePickupRoute() {
      if (activeVehicleIdOnMap) {
        const m = vehicleMeta[activeVehicleIdOnMap];
        if (m) {
          delete m.pickupRouteTotalSec;
          delete m.pickupRouteAt;
        }
      }
      lastPickupRouteOrigin = null;
      lastPickupDirectionsResult = null;
      if (vehiclePickupDirectionsRenderer) vehiclePickupDirectionsRenderer.setMap(null);
      applyCircuitPolylineStyle();
    }

    function clearPickupRoute() {
      clearPassengerTripRoute();
      clearVehiclePickupRoute();
    }

    function updatePassengerDirectPreviewRoute(directionsService, force) {
      if (!map || !directionsService) return;
      if (!selectedLocation || !tripDestination) return;

      const portadaReq = getPassengerPortadaRouteRequest();
      if (!portadaReq || !portadaReq.origin || !portadaReq.destination) {
        clearPassengerTripRoute();
        return;
      }
      const o = portadaReq.origin;
      const d = portadaReq.destination;
      const hasWaypoints = portadaReq.waypoints && portadaReq.waypoints.length;
      if (!hasWaypoints && distanceKm(o.lat, o.lng, d.lat, d.lng) < 0.03) {
        clearPassengerTripRoute();
        return;
      }

      const snap = String(selectedLocation) + "|" + String(tripDestination);
      if (!force && passengerDirectPreviewActive && lastPassengerPreviewSnap === snap && lastPassengerTripDirectionsResult) {
        return;
      }
      lastPassengerPreviewSnap = snap;

      const routeArgs = {
        origin: o,
        destination: d,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      };
      if (portadaReq.waypoints && portadaReq.waypoints.length) {
        routeArgs.waypoints = portadaReq.waypoints;
        routeArgs.optimizeWaypoints = false;
      }

      directionsService.route(routeArgs, function(result, status) {
        if (!selectedLocation || !tripDestination) return;
        if (lastPassengerPreviewSnap !== snap) return;
        if (status !== google.maps.DirectionsStatus.OK) {
          clearPassengerTripRoute();
          return;
        }
        passengerDirectPreviewActive = true;
        applyCircuitPolylineStyle();
        if (!passengerTripDirectionsRenderer) {
          passengerTripDirectionsRenderer = new google.maps.DirectionsRenderer({
            map: map,
            suppressMarkers: true,
            preserveViewport: true,
            polylineOptions: {
              strokeColor: "#0b3d91",
              strokeOpacity: 0.95,
              strokeWeight: 7,
              zIndex: 3
            }
          });
        } else {
          passengerTripDirectionsRenderer.setMap(map);
        }
        passengerTripDirectionsRenderer.setDirections(result);
        lastPassengerTripDirectionsResult = result;
        if (selectedLocation === "hotel" && tripDestination && result.routes[0] && result.routes[0].legs) {
          const k = String(tripDestination).toLowerCase();
          var previewSec = 0;
          result.routes[0].legs.forEach(function(leg) {
            previewSec += leg.duration.value;
          });
          if (k === "ifema" && result.routes[0].legs[0]) {
            routeHotelToIfemaDriveSec = result.routes[0].legs[0].duration.value;
          }
          if (k === "simuladores") routeHotelToSimuladoresDriveSec = previewSec;
          updateLegendCompact();
        }
        scheduleFitRouteViewport(result);
      });
    }

    function extendBoundsFromDirectionsResult(bounds, directionsResult) {
      if (!directionsResult || !directionsResult.routes || !directionsResult.routes[0]) return;
      const route = directionsResult.routes[0];
      if (route.overview_path && route.overview_path.length) {
        route.overview_path.forEach(function(pt) {
          bounds.extend(pt);
        });
      }
      route.legs.forEach(function(leg) {
        bounds.extend(leg.start_location);
        bounds.extend(leg.end_location);
      });
    }

    function updatePickupRoute(lat, lng, directionsService) {
      if (!signedUp || !selectedLocation || !tripDestination || !directionsService || !map) {
        clearVehiclePickupRoute();
        return;
      }
      const destKey = getEffectiveTripDestinationKey();
      if (!destKey) {
        clearVehiclePickupRoute();
        return;
      }
      const routeKey = getPickupRouteCacheKey();
      const last = lastPickupRouteOrigin;
      if (last && last.key === routeKey && distanceKm(lat, lng, last.lat, last.lng) < PICKUP_ROUTE_THROTTLE_KM) {
        return;
      }

      const currentLeg = getCurrentLegIndex(lat, lng);
      const requestSnap = routeKey;
      lastPickupRouteOrigin = { lat: lat, lng: lng, key: routeKey };

      function applyVehiclePickupDirectionsResult(result) {
        if (!signedUp || getPickupRouteCacheKey() !== requestSnap) return;
        lastPickupDirectionsResult = result;
        if (!vehiclePickupDirectionsRenderer) {
          vehiclePickupDirectionsRenderer = new google.maps.DirectionsRenderer({
            map: map,
            suppressMarkers: true,
            preserveViewport: true,
            polylineOptions: {
              strokeColor: "#58a6ff",
              strokeOpacity: 0.92,
              strokeWeight: 6,
              zIndex: 4
            }
          });
        } else {
          vehiclePickupDirectionsRenderer.setMap(map);
        }
        vehiclePickupDirectionsRenderer.setDirections(result);
        applyCircuitPolylineStyle();
        const aid = activeVehicleIdOnMap;
        if (aid && result.routes && result.routes[0]) {
          const meta = vehicleMeta[aid] || {};
          var totalSec = 0;
          result.routes[0].legs.forEach(function(leg) {
            totalSec += leg.duration.value;
          });
          meta.pickupRouteTotalSec = totalSec;
          meta.pickupRouteAt = Date.now();
          vehicleMeta[aid] = meta;
          paintActiveVehicleExtraordinaryEta();
          updateLegendCompact();
        }
        if (followUserAndVehicle && hasSignupDestinationReady() && activeVehicleIdOnMap && lastActiveVehicleEta) {
          requestAnimationFrame(function() {
            fitUserAndVehicleViewport();
          });
        }
      }

      if (destKey === "ifema" || destKey === "simuladores") {
        const destPoint = destKey === "ifema" ? IFEMA : SIMULADORES;
        directionsService.route({
          origin: { lat: lat, lng: lng },
          destination: destPoint,
          travelMode: google.maps.TravelMode.DRIVING,
          region: "es"
        }, function(result, status) {
          if (status !== google.maps.DirectionsStatus.OK) {
            clearVehiclePickupRoute();
            return;
          }
          applyVehiclePickupDirectionsResult(result);
        });
        return;
      }

      const destination = getSignupDestinationPosition();
      const destinationStopIndex = locationKeyToStopIndex(destKey);
      if (!destination || destinationStopIndex === null) {
        clearVehiclePickupRoute();
        return;
      }
      const waypoints = buildCircuitWaypoints(currentLeg, destinationStopIndex);
      directionsService.route({
        origin: { lat: lat, lng: lng },
        destination: destination,
        waypoints: waypoints,
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status !== google.maps.DirectionsStatus.OK) {
          clearVehiclePickupRoute();
          return;
        }
        applyVehiclePickupDirectionsResult(result);
      });
    }

    function refreshPickupRoute() {
      if (!directionsServiceInstance) {
        clearPickupRoute();
        return;
      }
      if (selectedLocation && tripDestination) {
        updatePassengerDirectPreviewRoute(directionsServiceInstance, false);
      } else {
        clearPassengerTripRoute();
      }
      if (activeVehicleIdOnMap && lastActiveVehicleEta) {
        updatePickupRoute(
          lastActiveVehicleEta.lat,
          lastActiveVehicleEta.lng,
          directionsServiceInstance
        );
      } else {
        clearVehiclePickupRoute();
      }
    }

    // Puntos finales de cada tramo: leg 0→T1, 1→T2, 2→T4, 3→Hotel
    function getEndOfLeg(legIndex) {
      if (legIndex < 3) return { lat: TERMINALES[legIndex].lat, lng: TERMINALES[legIndex].lng };
      return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
    }

    // Devuelve en qué tramo del circuito está el vehículo (0=Hotel→T1, 1=T1→T2, 2=T2→T4, 3=T4→Hotel). -1 si está en el hotel.
    function getCurrentLegIndex(lat, lng) {
      const dHotel = distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng);
      if (dHotel < 0.15) return -1;
      const d = [
        distanceKm(lat, lng, TERMINALES[0].lat, TERMINALES[0].lng),
        distanceKm(lat, lng, TERMINALES[1].lat, TERMINALES[1].lng),
        distanceKm(lat, lng, TERMINALES[2].lat, TERMINALES[2].lng)
      ];
      const iMin = d.indexOf(Math.min.apply(null, d));
      const distToHotel = dHotel;
      if (distToHotel <= d[0] && distToHotel <= d[1] && distToHotel <= d[2]) return 3;
      if (iMin === 0) return d[0] <= d[1] ? 0 : 1;
      if (iMin === 1) return d[0] <= d[2] ? 1 : 2;
      return d[1] <= distToHotel ? 2 : 3;
    }

    function computeStopEtas(currentLeg, remainingOnLegSec, departureWaitSec) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return null;
      const etas = [];
      const start = currentLeg < 0 ? 0 : currentLeg;
      for (let s = start; s < 4; s++) {
        let sec = departureWaitSec || 0;
        if (currentLeg < 0) {
          if (s < 3) {
            for (let i = 0; i <= s; i++) sec += routeLegDurationsSec[i];
            sec += s * PARADA_TERMINAL_MIN * 60;
          } else {
            sec = getHotelArrivalSecOrchestratedFromHotel(departureWaitSec);
          }
        } else {
          sec += remainingOnLegSec;
          for (let i = currentLeg + 1; i <= s; i++) sec += routeLegDurationsSec[i];
          sec += (s - currentLeg) * PARADA_TERMINAL_MIN * 60;
        }
        etas.push({ name: ROUTE_STOP_NAMES[s], sec: sec, text: formatArrivalTimeMadrid(sec) });
      }
      return etas;
    }

    function formatEtasDisplay(stopEtas, depInfo, detailPrefix) {
      if (!stopEtas || !stopEtas.length) return { summary: "—", detail: "" };
      const next = stopEtas[0];
      const summary = "Siguiente: " + next.name + " · llegada " + next.text;
      const lines = stopEtas.map(function(stop) { return stop.name + ": " + stop.text; });
      if (depInfo) {
        if (depInfo.departFromHotel) {
          lines.unshift(
            depInfo.imminent
              ? "Salida inminente desde el hotel"
              : "Salida a las " + depInfo.time + " desde el hotel"
          );
        } else {
          lines.unshift((depInfo.imminent ? "Salida inminente " : "Salida ") + depInfo.time);
        }
      }
      if (detailPrefix) lines.unshift(detailPrefix);
      return { summary: summary, detail: lines.join("\n") };
    }

    /**
     * Pasajero en hotel: fila del vehículo activo con próxima salida :00/:30 desde el hotel (no posición GPS del bus).
     */
    function paintActiveVehicleExtraordinaryEta() {
      if (!activeVehicleIdOnMap) return;
      if (!signedUp || !tripDestination || !isExtraordinaryDestinationKey(tripDestination)) return;
      const destName = getExtraordinaryStopName(tripDestination);
      if (!destName) return;
      const vid = activeVehicleIdOnMap;
      const meta = vehicleMeta[vid] || {};
      const rem = getStopEtaSecondsRemaining(meta, destName);
      if (rem === null) return;
      const el = document.getElementById(etaEl[vid]);
      if (el) el.textContent = "Siguiente: " + destName + " · llegada " + formatArrivalTimeMadrid(rem);
      const statusNode = document.getElementById(statusEl[vid]);
      if (statusNode) {
        statusNode.textContent = "Servicio directo " + destName + " · " + formatMinutesDelta(rem);
      }
    }

    function paintActiveVehicleRowOrchestratedHotelEtas() {
      if (!activeVehicleIdOnMap) return;
      if (!signedUp || selectedLocation !== "hotel" || !tripDestination) return;
      if (!isOrchestratedCircuitDestinationKey(tripDestination)) return;
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return;
      const depInfo = getNextHotelOrchestratedDepartureInfo();
      const orch = computeStopEtas(-1, 0, depInfo.secondsUntil);
      if (!orch || !orch.length) return;
      const vid = activeVehicleIdOnMap;
      const meta = vehicleMeta[vid] || {};
      meta.stopEtas = orch;
      meta.stopEtasAt = Date.now();
      meta.routeEtaContext = {
        currentLeg: -1,
        remainingOnLegSec: 0,
        departureWaitSec: depInfo.secondsUntil
      };
      vehicleMeta[vid] = meta;
      const disp = formatEtasDisplay(orch, {
        imminent: depInfo.imminent,
        time: depInfo.time,
        departFromHotel: true
      }, null);
      const el = document.getElementById(etaEl[vid]);
      if (el) el.textContent = disp.summary;
      const statusNode = document.getElementById(statusEl[vid]);
      if (statusNode) statusNode.textContent = disp.detail;
    }

    function applyRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, departureWaitSec, depInfo, detailPrefix) {
      const stopEtas = computeStopEtas(currentLeg, remainingOnLegSec, departureWaitSec);
      const meta = vehicleMeta[vehicleId] || {};
      meta.stopEtas = stopEtas;
      meta.stopEtasAt = Date.now();
      meta.routeEtaContext = {
        currentLeg: currentLeg,
        remainingOnLegSec: remainingOnLegSec,
        departureWaitSec: departureWaitSec || 0
      };
      vehicleMeta[vehicleId] = meta;
      const display = formatEtasDisplay(stopEtas, depInfo, detailPrefix);
      setEtaForVehicle(vehicleId, label, {
        summary: display.summary,
        detail: display.detail,
        stopEtas: stopEtas
      });
    }

    function refreshActiveVehicleEta(directionsService) {
      if (!lastActiveVehicleEta || !directionsService) return;
      updateEtaFromGoogle(
        lastActiveVehicleEta.id,
        lastActiveVehicleEta.lat,
        lastActiveVehicleEta.lng,
        lastActiveVehicleEta.label,
        directionsService,
        false
      );
    }

    /** Tras volver a la pestaña o reconectar: el throttle de ETA dejaba “Calculando…” sin nueva petición a Google. */
    function forceRefreshPassengerEta() {
      if (!directionsServiceInstance || !lastActiveVehicleEta) {
        updateLegendCompact();
        return;
      }
      if (activeVehicleIdOnMap) delete lastEtaOrigin[activeVehicleIdOnMap];
      delete lastEtaOrigin[lastActiveVehicleEta.id];
      updateEtaFromGoogle(
        lastActiveVehicleEta.id,
        lastActiveVehicleEta.lat,
        lastActiveVehicleEta.lng,
        lastActiveVehicleEta.label,
        directionsServiceInstance,
        true
      );
      refreshPickupRoute();
      updateLegendCompact();
    }

    function updateEtaFromGoogle(vehicleId, lat, lng, label, directionsService, force) {
      const forceRefresh = force === true;
      const currentLeg = getCurrentLegIndex(lat, lng);
      if (currentLeg < 0) {
        if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) {
          setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: "" });
          return;
        }
        const svc = getVehicleService(vehicleId);
        if (svc.serviceMode === "adhoc") {
          applyRouteEtas(
            vehicleId,
            label,
            -1,
            0,
            0,
            null,
            "Servicio extraordinario (IFEMA, simuladores, apoyo…). En hotel sin cadencia fija de circuito; tiempos por Maps."
          );
          return;
        }
        const sched = svc.circuitSchedule === "B" ? "B" : "A";
        const dep = getHotelDepartureDisplayCircuit(sched);
        const depLine = { imminent: dep.imminent, time: dep.time, departFromHotel: true };
        applyRouteEtas(
          vehicleId,
          label,
          -1,
          0,
          getSecondsUntilHotelDepartureCircuit(sched),
          depLine
        );
        return;
      }
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) {
        setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: "" });
        return;
      }
      const last = lastEtaOrigin[vehicleId];
      if (!forceRefresh && last && distanceKm(lat, lng, last.lat, last.lng) < ETA_THROTTLE_KM) {
        if (vehicleId === activeVehicleIdOnMap && signedUp && selectedLocation) {
          const meta = vehicleMeta[vehicleId] || {};
          const dest = getDestinationStopName();
          if (dest && getStopEtaSecondsRemaining(meta, dest) !== null) return;
        } else {
          return;
        }
      }
      lastEtaOrigin[vehicleId] = { lat: lat, lng: lng };
      setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: "" });

      const endPoint = getEndOfLeg(currentLeg);
      directionsService.route({
        origin: { lat: lat, lng: lng },
        destination: endPoint,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status !== google.maps.DirectionsStatus.OK) {
          if (vehicleId === activeVehicleIdOnMap) setEtaForVehicle(vehicleId, label, { summary: "—", detail: "" });
          return;
        }
        if (vehicleId !== activeVehicleIdOnMap) return;
        const remainingOnLegSec = result.routes[0].legs[0].duration.value;
        applyRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, 0, null);
      });
    }

    function setVehicleRowActive(vehicleId) {
      vehicleIds.forEach(function(id) {
        const row = document.getElementById(vehicleRowEl[id]);
        if (row) row.classList.toggle("legend-vehicle-row-active", id === vehicleId);
      });
      updateLegendCompact();
    }

    function setPaxForVehicle(vehicleId, passengers, capacity, isActive) {
      const meta = vehicleMeta[vehicleId] || {};
      meta.passengers = passengers || 0;
      meta.capacity = capacity || 8;
      vehicleMeta[vehicleId] = meta;
      const paxNode = document.getElementById(paxEl[vehicleId]);
      if (paxNode) paxNode.textContent = isActive ? ("A bordo " + meta.passengers + "/" + meta.capacity) : "A bordo —";
      if (vehicleMarkers[vehicleId]) {
        const label = meta.label || vehicleId;
        vehicleMarkers[vehicleId].setTitle(label + " · A bordo " + meta.passengers + "/" + meta.capacity);
      }
    }

    function setEtaForVehicle(vehicleId, label, eta) {
      const meta = vehicleMeta[vehicleId] || {};
      meta.label = label;
      if (eta && eta.stopEtas) {
        meta.stopEtas = eta.stopEtas;
        meta.stopEtasAt = Date.now();
      }
      vehicleMeta[vehicleId] = meta;

      if (
        vehicleId === activeVehicleIdOnMap &&
        signedUp &&
        tripDestination &&
        isExtraordinaryDestinationKey(tripDestination)
      ) {
        const destName = getExtraordinaryStopName(tripDestination);
        const rem = destName ? getStopEtaSecondsRemaining(meta, destName) : null;
        if (rem !== null) {
          paintActiveVehicleExtraordinaryEta();
          if (vehicleId === activeVehicleIdOnMap) updateLegendCompact();
          return;
        }
      }

      const useOrchestratedHotelRow =
        vehicleId === activeVehicleIdOnMap &&
        signedUp &&
        selectedLocation === "hotel" &&
        tripDestination &&
        isOrchestratedCircuitDestinationKey(tripDestination) &&
        routeLegDurationsSec &&
        routeLegDurationsSec.length === 4;

      if (useOrchestratedHotelRow) {
        paintActiveVehicleRowOrchestratedHotelEtas();
      } else {
        const el = document.getElementById(etaEl[vehicleId]);
        if (el) el.textContent = (eta && eta.summary) ? eta.summary : "—";
        const statusNode = document.getElementById(statusEl[vehicleId]);
        if (statusNode) statusNode.textContent = (eta && eta.detail) ? eta.detail : "";
      }
      if (vehicleId === activeVehicleIdOnMap) updateLegendCompact();
    }

    function createVehicleIcon(vehicleId) {
      const c = colors[vehicleId] || "#888";
      return {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: c,
        fillOpacity: 1,
        strokeColor: "#fff",
        strokeWeight: 3
      };
    }

    let routeBounds = null;
    let routeFitTimer = null;

    function buildRouteBounds(directionsResult) {
      const bounds = new google.maps.LatLngBounds();
      bounds.extend(CAMPEZO);
      bounds.extend(IFEMA);
      TERMINALES.forEach(function(t) {
        bounds.extend({ lat: t.lat, lng: t.lng });
      });
      if (directionsResult && directionsResult.routes[0]) {
        extendBoundsFromDirectionsResult(bounds, directionsResult);
      }
      if (ifemaCircuitDirectionsResult) {
        extendBoundsFromDirectionsResult(bounds, ifemaCircuitDirectionsResult);
      }
      return bounds;
    }

    function fitRouteViewport(directionsResult) {
      if (!map) return;
      if (directionsResult) routeBounds = buildRouteBounds(directionsResult);
      if (!routeBounds) return;
      map.fitBounds(routeBounds, getMapChromePadding());
    }

    function scheduleFitRouteViewport(directionsResult) {
      if (routeFitTimer) clearTimeout(routeFitTimer);
      requestAnimationFrame(function() {
        fitRouteViewport(directionsResult);
        if (map) google.maps.event.trigger(map, "resize");
        routeFitTimer = setTimeout(function() {
          fitRouteViewport();
        }, 250);
      });
    }

    function applyIfemaPolylineStyle() {
      if (!ifemaDirectionsRenderer) return;
      const hasV = !!(activeVehicleIdOnMap && lastActiveVehicleEta);
      var strokeOpacity;
      var strokeWeight;
      if (hasV) {
        strokeOpacity = 0.32;
        strokeWeight = 4;
      } else if (passengerDirectPreviewActive) {
        strokeOpacity = 0.14;
        strokeWeight = 3;
      } else {
        strokeOpacity = 0.48;
        strokeWeight = 5;
      }
      ifemaDirectionsRenderer.setOptions({
        polylineOptions: {
          strokeColor: "#a78bfa",
          strokeOpacity: strokeOpacity,
          strokeWeight: strokeWeight,
          zIndex: 2
        }
      });
      if (ifemaCircuitDirectionsResult && map) {
        ifemaDirectionsRenderer.setMap(map);
        ifemaDirectionsRenderer.setDirections(ifemaCircuitDirectionsResult);
      }
    }

    function applyCircuitPolylineStyle() {
      if (!directionsRenderer) return;
      const hasV = !!(activeVehicleIdOnMap && lastActiveVehicleEta);
      var strokeOpacity;
      var strokeWeight;
      if (hasV) {
        strokeOpacity = 0.4;
        strokeWeight = 4;
      } else if (passengerDirectPreviewActive) {
        strokeOpacity = 0.16;
        strokeWeight = 3;
      } else {
        strokeOpacity = 0.34;
        strokeWeight = 4;
      }
      directionsRenderer.setOptions({
        polylineOptions: {
          strokeColor: "#6a9fe8",
          strokeOpacity: strokeOpacity,
          strokeWeight: strokeWeight,
          zIndex: 1
        }
      });
      if (circuitDirectionsResult && map) {
        directionsRenderer.setMap(map);
        directionsRenderer.setDirections(circuitDirectionsResult);
      }
      applyIfemaPolylineStyle();
    }

    function syncNoVehicleMapBanner() {
      const el = document.getElementById("mapNoVehicleBanner");
      if (!el || !map) return;
      const show = !!(circuitDirectionsResult || ifemaCircuitDirectionsResult) && !activeVehicleIdOnMap;
      el.hidden = !show;
    }

    function initMap() {
      if (map) {
        google.maps.event.trigger(map, "resize");
        if (circuitDirectionsResult && directionsRenderer) {
          directionsRenderer.setMap(map);
          directionsRenderer.setDirections(circuitDirectionsResult);
          applyCircuitPolylineStyle();
          syncNoVehicleMapBanner();
        }
        if (ifemaCircuitDirectionsResult && ifemaDirectionsRenderer) {
          ifemaDirectionsRenderer.setMap(map);
          ifemaDirectionsRenderer.setDirections(ifemaCircuitDirectionsResult);
          applyIfemaPolylineStyle();
        }
        scheduleFitRouteViewport();
        resyncPassengerSession();
        forceRefreshPassengerEta();
        return;
      }

      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 40.465, lng: -3.58 },
        zoom: 11,
        mapTypeControl: false,
        fullscreenControl: false,
        zoomControl: false,
        streetViewControl: false,
        rotateControl: false,
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", stylers: [{ visibility: "off" }] }
        ]
      });

      directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#388bfd",
          strokeOpacity: 0.82,
          strokeWeight: 6,
          zIndex: 1
        }
      });

      ifemaDirectionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#a78bfa",
          strokeOpacity: 0.48,
          strokeWeight: 5,
          zIndex: 2
        }
      });

      // Ruta circular: Campezo 4 → T1 → T2 → T4 → Campezo 4 (por carretera)
      const directionsService = new google.maps.DirectionsService();
      directionsServiceInstance = directionsService;
      const hotelLatLng = { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
      const request = {
        origin: hotelLatLng,
        destination: hotelLatLng,
        waypoints: TERMINALES.map(function(t) { return { location: { lat: t.lat, lng: t.lng }, stopover: true }; }),
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      };

      directionsService.route(request, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK) {
          circuitDirectionsRequestFailed = false;
          circuitDirectionsResult = result;
          directionsRenderer.setMap(map);
          directionsRenderer.setDirections(result);
          routeLegDurationsSec = result.routes[0].legs.map(function(leg) { return leg.duration.value; });
          routeT4ToHotelDriveSec = null;
          applyCircuitPolylineStyle();
          scheduleFitRouteViewport(result);
          syncNoVehicleMapBanner();
          refreshActiveVehicleEta(directionsService);
          refreshPickupRoute();
          updateLegendCompact();
          fetchRouteT4ToHotelDrive(directionsService, function() {
            fetchRouteHotelIfemaCircuit(directionsService, function() {
              routeBounds = buildRouteBounds(result);
              scheduleFitRouteViewport(result);
              fetchRouteHotelExtraordinaryDrives(directionsService, function() {
                refreshActiveVehicleEta(directionsService);
                refreshPickupRoute();
                updateLegendCompact();
              });
            });
          });
        } else {
          circuitDirectionsRequestFailed = true;
          circuitDirectionsResult = null;
          routeLegDurationsSec = null;
          updateLegendCompact();
        }
      });

      window.addEventListener("resize", function() {
        if (followUserAndVehicle && hasSignupDestinationReady() && activeVehicleIdOnMap && lastActiveVehicleEta) {
          fitUserAndVehicleViewport();
        } else if (!signedUp || !activeVehicleIdOnMap) {
          scheduleFitRouteViewport();
        }
      });

      map.addListener("dragstart", onMapUserGesture);
      map.addListener("zoom_changed", onMapUserGesture);

      // Icono visible para paradas: círculo con letra (hotel H, terminales T1–T4)
      function makeStopIcon(letter, color) {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><circle cx="18" cy="18" r="15" fill="' + (color || "#58a6ff") + '" stroke="#fff" stroke-width="2"/><text x="18" y="23" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">' + letter + '</text></svg>';
        return {
          url: "data:image/svg+xml," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(36, 36),
          anchor: new google.maps.Point(18, 18)
        };
      }
      const hotelMarker = new google.maps.Marker({
        map: map,
        position: CAMPEZO,
        title: "Hotel Axor Barajas - Calle Campezo 4",
        icon: makeStopIcon("H", "#58a6ff")
      });
      const hotelStop = {
        marker: hotelMarker,
        location: "hotel",
        title: "Hotel Axor Barajas - Calle Campezo 4",
        link: null
      };
      stopPoints.push(hotelStop);

      TERMINALES.forEach(function(t) {
        const locKey = t.key;
        const iconLetter = locKey.charAt(0).toUpperCase() + locKey.slice(1);
        const m = new google.maps.Marker({
          map: map,
          position: { lat: t.lat, lng: t.lng },
          title: t.name,
          icon: makeStopIcon(iconLetter, "#388bfd")
        });
        const stop = {
          marker: m,
          location: locKey,
          title: t.name,
          link: t.link
        };
        stopPoints.push(stop);
      });

      new google.maps.Marker({
        map: map,
        position: { lat: IFEMA.lat, lng: IFEMA.lng },
        title: "IFEMA Madrid",
        icon: makeStopIcon("IF", "#a78bfa")
      });

      if (!vehiclesSocketBound) {
        vehiclesSocketBound = true;
        socket.on("vehicles", function(vehicles) {
          if (!map) return;
        lastVehiclesLive = {};
        vehicleIds.forEach(function(id) { lastVehiclesLive[id] = false; });
        vehicleIds.forEach(function(id) {
          var row = vehicles[id];
          if (!row) return;
          vehicleServiceById[id] = {
            serviceMode: row.serviceMode === "adhoc" ? "adhoc" : "circuit",
            circuitSchedule: row.serviceMode === "adhoc" ? null : (row.circuitSchedule === "B" ? "B" : "A")
          };
        });

        var activeOne = null;
        for (const [id, v] of Object.entries(vehicles)) {
          if (v.lastUpdate && !activeOne) activeOne = { id: id, v: v };
        }
        if (activeOne) lastVehiclesLive[activeOne.id] = true;
        activeVehicleIdOnMap = activeOne ? activeOne.id : null;
        if (!activeOne) {
          lastActiveVehicleEta = null;
          refreshPickupRoute();
          stopTrackingFitLoop();
          if (circuitDirectionsResult && directionsRenderer && map) {
            directionsRenderer.setMap(map);
            directionsRenderer.setDirections(circuitDirectionsResult);
            applyCircuitPolylineStyle();
            scheduleFitRouteViewport(circuitDirectionsResult);
          }
        } else {
          applyCircuitPolylineStyle();
        }
        syncNoVehicleMapBanner();
        setVehicleRowActive(activeVehicleIdOnMap);

        var activeId = activeOne ? activeOne.id : null;
        vehicleIds.forEach(function(id) {
          var vehicle = vehicles[id];
          if (!vehicle) return;
          var label = vehicle.label || id;
          setPaxForVehicle(id, vehicle.passengers, vehicle.capacity, id === activeId);
          if (id !== activeId && vehicleMarkers[id]) {
            vehicleMarkers[id].setMap(null);
            vehicleMarkers[id] = null;
          }
          if (id !== activeId) setEtaForVehicle(id, label, { summary: "—", detail: "" });
        });

        if (activeOne) {
          var id = activeOne.id;
          var v = activeOne.v;
          var label = v.label || id;
          lastActiveVehicleEta = { id: id, lat: v.lat, lng: v.lng, label: label };
          var pos = { lat: v.lat, lng: v.lng };
          if (vehicleMarkers[id]) {
            vehicleMarkers[id].setPosition(pos);
          } else {
            vehicleMarkers[id] = new google.maps.Marker({
              map: map,
              position: pos,
              title: label,
              icon: createVehicleIcon(id),
              zIndex: 100
            });
          }
          setPaxForVehicle(id, v.passengers, v.capacity, true);
          updateEtaFromGoogle(id, v.lat, v.lng, label, directionsService);
          updatePickupRoute(v.lat, v.lng, directionsService);
          if (signedUp && selectedLocation) updateTrackingFitLoop();
        }
        });
      }
    }
  </script>
</body>
</html>
