<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="screen-orientation" content="portrait">
  <title>Transfer Axor - Ubicación en tiempo real</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Opcional: crea public/config.js con window.GOOGLE_MAPS_API_KEY = "tu_key" -->
  <script src="config.js"></script>
  <script>
    (function() {
      var key = (typeof window.GOOGLE_MAPS_API_KEY !== "undefined" && window.GOOGLE_MAPS_API_KEY) ? window.GOOGLE_MAPS_API_KEY : "YOUR_GOOGLE_MAPS_API_KEY";
      var s = document.createElement("script");
      s.src = "https://maps.googleapis.com/maps/api/js?key=" + key + "&callback=initMap&language=es";
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    })();
  </script>
</head>
<body class="map-page map-page-vertical">
  <script>
    (function() {
      try {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("portrait").catch(function() {});
        }
      } catch (e) {}
    })();
  </script>
  <header class="map-header">
    <img src="img/logo-axor.png" alt="Axor Hoteles" class="header-logo">
    <h1>Transfer — Barajas T1–T4 · IFEMA</h1>
  </header>
  <section class="client-signup" id="clientSignup">
    <!-- Estado de la detección automática de ubicación -->
    <div class="client-signup-locate" id="locateRow">
      <button type="button" class="client-signup-locate-btn" id="locateBtn" aria-label="Detectar mi ubicación">
        <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/>
        </svg>
        Detectar ubicación
      </button>
      <span class="client-signup-locate-status" id="locateStatus"></span>
    </div>
    <!-- Destino: justo debajo de ubicación; visible al tener parada de espera elegida -->
    <div class="client-signup-dest" id="hotelDestRow" hidden>
      <div class="client-signup-dest-inner">
        <span class="client-signup-label client-signup-dest-label">Destino</span>
        <div class="client-signup-dest-strip" id="hotelDestStops" role="group" aria-label="Destino: Hoteles Axor, T1, T2, T4, IFEMA o Simuladores">
          <button type="button" class="client-signup-stop client-signup-dest" data-dest="hotel">Hoteles Axor</button>
          <button type="button" class="client-signup-stop client-signup-dest" data-dest="t1">T1</button>
          <button type="button" class="client-signup-stop client-signup-dest" data-dest="t2">T2</button>
          <button type="button" class="client-signup-stop client-signup-dest" data-dest="t4">T4</button>
          <button type="button" class="client-signup-stop client-signup-dest" data-dest="ifema">IFEMA</button>
          <button type="button" class="client-signup-stop client-signup-dest" data-dest="simuladores">Simuladores</button>
        </div>
      </div>
    </div>
    <!-- Selector manual: visible solo cuando GPS no reconoce ninguna parada -->
    <div id="manualStopsRow" hidden>
      <span class="client-signup-label">¿Dónde esperas?</span>
      <div class="client-signup-stops" id="signupStops" role="group" aria-label="Parada">
        <button type="button" class="client-signup-stop" data-location="hotel">Hotel Campezo 4</button>
        <button type="button" class="client-signup-stop" data-location="t1">T1</button>
        <button type="button" class="client-signup-stop" data-location="t2">T2</button>
        <button type="button" class="client-signup-stop" data-location="t4">T4</button>
      </div>
    </div>
    <div class="client-signup-party">
      <span class="client-signup-party-label">Personas</span>
      <button type="button" class="client-signup-step" id="partyMinus" aria-label="Quitar persona">−</button>
      <span class="client-signup-count" id="partyCount">1</span>
      <button type="button" class="client-signup-step" id="partyPlus" aria-label="Añadir persona">+</button>
    </div>
    <button type="button" class="client-signup-cancel" id="cancelSignupBtn" hidden>Cancelar</button>
    <button type="button" class="client-schedule-open" id="scheduleToggleBtn" aria-haspopup="dialog" aria-controls="scheduleDialog">Programar hora</button>
    <span class="client-signup-status" id="signupStatus"></span>
    <span class="client-schedule-status" id="scheduleStatus"></span>
  </section>

  <dialog class="client-schedule-dialog" id="scheduleDialog">
    <div class="client-schedule-dialog-inner">
      <div class="client-schedule-dialog-head">
        <h2>Programar viaje</h2>
        <button type="button" class="client-schedule-close" id="scheduleCloseBtn" aria-label="Cerrar">×</button>
      </div>
      <div class="client-schedule-panel" id="schedulePanel">
      <div class="client-schedule-modes" role="tablist" aria-label="Tipo de programación">
        <button type="button" class="client-schedule-mode active" data-mode="datetime">Día y hora</button>
        <button type="button" class="client-schedule-mode" data-mode="flight">Código de vuelo</button>
      </div>
      <label class="client-schedule-label" id="scheduleLocationLabel" for="scheduleLocation">Salida desde</label>
      <select id="scheduleLocation" class="client-schedule-select">
        <option value="">Elige parada</option>
        <option value="hotel">Hotel Campezo 4</option>
        <option value="t1">Terminal T1</option>
        <option value="t2">Terminal T2</option>

        <option value="t4">Terminal T4</option>
      </select>
      <div id="scheduleDatetimeFields">
        <label class="client-schedule-label" for="scheduleDate">Día</label>
        <input type="date" id="scheduleDate" class="client-schedule-input">
        <label class="client-schedule-label" for="scheduleTime">Hora de salida</label>
        <input type="time" id="scheduleTime" class="client-schedule-input">
      </div>
      <div id="scheduleFlightFields" hidden>
        <label class="client-schedule-label" for="scheduleFlight">Código de vuelo</label>
        <div class="client-schedule-flight-row">
          <input type="text" id="scheduleFlight" class="client-schedule-input" inputmode="text" autocomplete="off" placeholder="Ej. IB872">
          <button type="button" class="client-schedule-flight-lookup" id="scheduleFlightLookupBtn">Consultar</button>
        </div>
        <p class="client-schedule-flight-preview" id="scheduleFlightPreview" hidden></p>
      </div>
      <div id="schedulePeopleFields">
        <label class="client-schedule-label" for="schedulePeople">Personas</label>
        <input type="number" id="schedulePeople" class="client-schedule-input" min="1" max="15" step="1" inputmode="numeric" value="1">
      </div>
      <p class="client-schedule-dialog-status" id="scheduleDialogStatus"></p>
      <div class="client-schedule-actions">
        <button type="button" class="client-schedule-save" id="scheduleSaveBtn">Guardar viaje</button>
        <button type="button" class="client-schedule-cancel" id="scheduleCancelBtn" hidden>Cancelar viaje</button>
      </div>
      </div>
    </div>
  </dialog>

  <div class="map-container">
    <div id="map"></div>
    <div class="map-no-vehicle-banner" id="mapNoVehicleBanner" role="region" aria-label="Estado del transfer" hidden>
      <span class="map-no-vehicle-banner-msg" id="mapNoVehicleBannerMsg">Aún no hay Transfer Axor en vivo</span>
      <button type="button" class="map-no-vehicle-banner-btn" id="mapRequestTransferViewBtn">Solicitar visualización Transfer</button>
    </div>
    <div class="legend display-board legend-sheet" id="legend">
      <button type="button" class="legend-sheet-head" id="legendToggle" aria-expanded="false" aria-controls="legendBody">
        <span class="legend-sheet-handle" aria-hidden="true"></span>
        <span class="legend-sheet-compact" id="legendCompact">Calculando…</span>
        <span class="legend-sheet-sub">Desliza arriba para ver todas las llegadas</span>
      </button>
      <div class="legend-sheet-body" id="legendBody">
      <div class="legend-section">
        <div class="hotel-circuits-intro">
          <div class="hotel-circuit-line"><span class="hotel-circuit-swatch barajas"></span> Barajas: Hotel → T1 → T2 → T4 → Hotel</div>
          <div class="hotel-circuit-line"><span class="hotel-circuit-swatch ifema"></span> IFEMA (ruta alternativa): Hotel → IFEMA → Hotel</div>
        </div>
        <div class="legend-eta-title">Vehículos en ruta (horario Madrid)</div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito1"><span class="legend-dot vito1"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito NJC</span><span class="legend-pax" id="pax1"></span><span class="legend-eta" id="eta1"></span></div><div class="legend-vehicle-status" id="status1"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito2"><span class="legend-dot vito2"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito LZD</span><span class="legend-pax" id="pax2"></span><span class="legend-eta" id="eta2"></span></div><div class="legend-vehicle-status" id="status2"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito3"><span class="legend-dot vito3"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito MMR</span><span class="legend-pax" id="pax3"></span><span class="legend-eta" id="eta3"></span></div><div class="legend-vehicle-status" id="status3"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito4"><span class="legend-dot vito4"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito MDX</span><span class="legend-pax" id="pax4"></span><span class="legend-eta" id="eta4"></span></div><div class="legend-vehicle-status" id="status4"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-minibus"><span class="legend-dot minibus"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Minibus MSX</span><span class="legend-pax" id="pax5"></span><span class="legend-eta" id="eta5"></span></div><div class="legend-vehicle-status" id="status5"></div></div></div>
      </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Hotel Axor Barajas, Calle Campezo 4, 28022 Madrid (coordenadas OSM del establecimiento)
    const CAMPEZO = { lat: 40.4479297, lng: -3.5830589 };
    const CAMPEZO_STR = "Calle Campezo 4, 28022 Madrid";
    // Terminales Barajas (paradas con enlace Google Maps) — ruta: Hotel → T1 → T2 → T4 → Hotel
    const TERMINALES = [
      { key: "t1", lat: 40.46412, lng: -3.57045, name: "Terminal T1 Salidas", link: "https://maps.app.goo.gl/jewMDcD6YS92QkUMA" },
      { key: "t2", lat: 40.46817, lng: -3.56969, name: "Terminal T2 Barajas", link: "https://maps.app.goo.gl/EtAnKzxfKwGc2fyeA" },
      { key: "t4", lat: 40.49125, lng: -3.59314, name: "Terminal T4 Barajas", link: "https://maps.app.goo.gl/MaAdQak6kArn1Xod6" }
    ];
    const IFEMA = { lat: 40.4643, lng: -3.6167 };
    /** Zona simuladores / formación vuelo en recinto Barajas (ajustar coordenadas si usáis otro punto exacto). */
    const SIMULADORES = { lat: 40.4708, lng: -3.5642 };

    const vehicleIds = ["vito1", "vito2", "vito3", "vito4", "minibus"];
    const colors = { vito1: "#f59e0b", vito2: "#10b981", vito3: "#8b5cf6", vito4: "#ec4899", minibus: "#ef4444" };
    const etaEl = { vito1: "eta1", vito2: "eta2", vito3: "eta3", vito4: "eta4", minibus: "eta5" };
    const paxEl = { vito1: "pax1", vito2: "pax2", vito3: "pax3", vito4: "pax4", minibus: "pax5" };
    const statusEl = { vito1: "status1", vito2: "status2", vito3: "status3", vito4: "status4", minibus: "status5" };
    const vehicleRowEl = { vito1: "vehicle-row-vito1", vito2: "vehicle-row-vito2", vito3: "vehicle-row-vito3", vito4: "vehicle-row-vito4", minibus: "vehicle-row-minibus" };
    const SIGNUP_LABELS = {
      hotel: "Hotel Campezo 4",
      t1: "Terminal T1",
      t2: "Terminal T2",
      t4: "Terminal T4"
    };
    const DESTINATION_LABELS = {
      hotel: "Hoteles Axor",
      t1: "T1",
      t2: "T2",
      t4: "T4",
      ifema: "IFEMA",
      simuladores: "Simuladores"
    };
    const LOCATION_TO_ROUTE_STOP = {
      hotel: "Hotel",
      t1: "T1",
      t2: "T2",
      t4: "T4",
      ifema: "IFEMA",
      simuladores: "Simuladores"
    };
    const MAX_SIGNUP_PEOPLE = 15;
    const PASSENGER_SIGNUP_STORAGE = "transferAxorPassengerSignup";

    const socket = io({
      reconnection: true,
      reconnectionAttempts: Infinity,
      reconnectionDelay: 800,
      reconnectionDelayMax: 15000,
      timeout: 45000,
      transports: ["websocket", "polling"],
    });
    let vehiclesSocketBound = false;
    let partyCount = 1;
    let signedUp = false;
    let selectedLocation = null;
    let tripDestination = null;
    /** Tras apuntarse en terminal, si pulsa Hotel: cancelamos y abrimos el selector de destino del hotel. */
    let pendingSwitchToHotelAfterCancel = false;
    const TERMINAL_LOCATIONS = { t1: true, t2: true, t4: true };

    /** Radio en km para considerar que el pasajero está en una parada. */
    const STOP_DETECT_RADIUS_KM = 0.35;

    /** Referencia al elemento de estado de geolocalización. */
    const locateBtnEl = document.getElementById("locateBtn");
    const locateStatusEl = document.getElementById("locateStatus");
    const manualStopsRowEl = document.getElementById("manualStopsRow");

    function setLocateStatus(text, isError) {
      if (!locateStatusEl) return;
      locateStatusEl.textContent = text;
      locateStatusEl.className = "client-signup-locate-status" + (isError ? " locate-error" : "");
    }

    function showManualStops() {
      if (manualStopsRowEl) manualStopsRowEl.hidden = false;
    }

    /** Devuelve el locationKey de la parada más cercana si está dentro del radio, o null. */
    function detectStopFromCoords(lat, lng) {
      const stops = [
        { key: "hotel", lat: CAMPEZO.lat,          lng: CAMPEZO.lng },
        { key: "t1",    lat: TERMINALES[0].lat,    lng: TERMINALES[0].lng },
        { key: "t2",    lat: TERMINALES[1].lat,    lng: TERMINALES[1].lng },
        { key: "t4",    lat: TERMINALES[2].lat,    lng: TERMINALES[2].lng }
      ];
      var best = null;
      var bestDist = Infinity;
      for (var i = 0; i < stops.length; i++) {
        var d = distanceKm(lat, lng, stops[i].lat, stops[i].lng);
        if (d < bestDist) { bestDist = d; best = stops[i].key; }
      }
      return bestDist <= STOP_DETECT_RADIUS_KM ? best : null;
    }

    function handleLocateSuccess(pos) {
      try {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;
        const stop = detectStopFromCoords(lat, lng);
        if (stop) {
          setLocateStatus("Ubicación detectada: " + (SIGNUP_LABELS[stop] || stop), false);
          beginLocationSignupFlow(stop);
        } else {
          setLocateStatus("No estás en ninguna parada conocida. Indica dónde esperas:", false);
          showManualStops();
        }
      } catch (e) {
        setLocateStatus("Error procesando ubicación. Indica dónde esperas:", true);
        showManualStops();
      }
    }

    function handleLocateError(err) {
      var msg = "No se pudo obtener ubicación.";
      if (err && err.code === 1) msg = "Permiso de ubicación denegado.";
      else if (err && err.code === 2) msg = "Ubicación no disponible.";
      setLocateStatus(msg + " Indica dónde esperas:", true);
      showManualStops();
    }

    function requestLocation() {
      if (!navigator.geolocation) {
        setLocateStatus("GPS no disponible. Indica dónde esperas:", true);
        showManualStops();
        return;
      }
      setLocateStatus("Detectando…", false);
      if (locateBtnEl) locateBtnEl.classList.add("locating");
      if (locateBtnEl) locateBtnEl.disabled = true;
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          if (locateBtnEl) { locateBtnEl.disabled = false; locateBtnEl.classList.remove("locating"); }
          handleLocateSuccess(pos);
        },
        function(err) {
          if (locateBtnEl) { locateBtnEl.disabled = false; locateBtnEl.classList.remove("locating"); }
          handleLocateError(err);
        },
        { enableHighAccuracy: true, timeout: 12000, maximumAge: 30000 }
      );
    }

    if (locateBtnEl) {
      locateBtnEl.addEventListener("click", requestLocation);
    }
    // Intentar geolocalización automática al cargar
    requestLocation();

    function getPickupRouteCacheKey() {
      if (!signedUp || !selectedLocation) return "";
      if (selectedLocation === "hotel") return "hotel|" + (tripDestination || "");
      return selectedLocation + "|" + (tripDestination || "");
    }

    function getEffectiveTripDestinationKey() {
      if (!signedUp || !selectedLocation) return null;
      return tripDestination || null;
    }

    function buildSignupPayload() {
      const payload = { location: selectedLocation, people: partyCount };
      if (tripDestination) payload.destination = tripDestination;
      return payload;
    }

    function persistPassengerSignup(location, people, destination) {
      if (!location) return;
      try {
        sessionStorage.setItem(
          PASSENGER_SIGNUP_STORAGE,
          JSON.stringify({
            location: location,
            people: people || 1,
            destination: destination || null
          })
        );
      } catch (e) {}
    }

    function clearPassengerSignupStorage() {
      try {
        sessionStorage.removeItem(PASSENGER_SIGNUP_STORAGE);
      } catch (e) {}
    }

    function reapplyStoredSignup() {
      if (!socket.connected) return;
      var raw = null;
      try {
        raw = sessionStorage.getItem(PASSENGER_SIGNUP_STORAGE);
      } catch (e) {
        return;
      }
      if (!raw) return;
      var d;
      try {
        d = JSON.parse(raw);
      } catch (e2) {
        return;
      }
      if (!d || !d.location) return;
      var n = Number(d.people);
      if (!Number.isFinite(n)) n = 1;
      n = Math.max(1, Math.min(MAX_SIGNUP_PEOPLE, Math.round(n)));
      const dest = String(d.destination || "").toLowerCase();
      if (!dest) return; // destino siempre requerido
      const payload = { location: d.location, people: n, destination: dest };
      socket.emit("signup", payload);
    }

    function resyncPassengerSession() {
      if (!socket.connected) {
        socket.connect();
        return;
      }
      if (signedUp && selectedLocation) {
        if (!tripDestination) return;
        socket.emit("signup", buildSignupPayload());
        persistPassengerSignup(selectedLocation, partyCount, tripDestination);
      } else {
        reapplyStoredSignup();
      }
    }

    socket.on("connect", function() {
      resyncPassengerSession();
      requestAnimationFrame(function() {
        forceRefreshPassengerEta();
      });
    });

    window.addEventListener("pageshow", function(ev) {
      requestAnimationFrame(function() {
        if (!socket.connected) socket.connect();
        else resyncPassengerSession();
        if (map) {
          google.maps.event.trigger(map, "resize");
          scheduleFitRouteViewport();
        }
        forceRefreshPassengerEta();
      });
    });

    document.addEventListener("visibilitychange", function() {
      if (document.visibilityState !== "visible") return;
      if (!socket.connected) socket.connect();
      else resyncPassengerSession();
      requestAnimationFrame(function() {
        forceRefreshPassengerEta();
      });
    });
    const partyCountEl = document.getElementById("partyCount");
    const partyMinusEl = document.getElementById("partyMinus");
    const partyPlusEl = document.getElementById("partyPlus");
    const cancelSignupBtnEl = document.getElementById("cancelSignupBtn");
    const signupStatusEl = document.getElementById("signupStatus");
    const legendEl = document.getElementById("legend");
    const legendToggleEl = document.getElementById("legendToggle");
    const legendCompactEl = document.getElementById("legendCompact");
    const signupStopEls = document.querySelectorAll("#signupStops .client-signup-stop");
    const hotelDestRowEl = document.getElementById("hotelDestRow");
    const hotelDestStopEls = document.querySelectorAll("#hotelDestStops .client-signup-dest");
    function setSelectedLocation(location) {
      selectedLocation = location || null;
      signupStopEls.forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.location === selectedLocation);
      });
    }

    function syncDestButtons() {
      hotelDestStopEls.forEach(function(btn) {
        // Ocultar el botón que coincide con la parada actual (no tiene sentido viajar a donde ya estás)
        btn.hidden = btn.dataset.dest === selectedLocation;
        btn.classList.toggle("active", btn.dataset.dest === tripDestination);
        btn.disabled = false;
      });
    }

    function syncHotelDestRow() {
      if (!hotelDestRowEl) return;
      // Mostrar la tira de destino siempre que haya una parada seleccionada
      hotelDestRowEl.hidden = !selectedLocation;
      syncDestButtons();
    }

    function updateSignupStatus(location, people) {
      if (!location) {
        signupStatusEl.textContent = "";
        return;
      }
      const label = SIGNUP_LABELS[location] || location;
      const destHint = tripDestination
        ? " → " + (DESTINATION_LABELS[tripDestination] || tripDestination)
        : "";
      signupStatusEl.textContent = people > 1
        ? "Apuntado en " + label + destHint + " (" + people + " personas)"
        : "Apuntado en " + label + destHint;
    }

    function beginLocationSignupFlow(location) {
      if (!location) return;
      if (signedUp) {
        if (selectedLocation === location) return;
        pendingSwitchToHotelAfterCancel = (location === "hotel");
        socket.emit("cancel-signup");
        // Para terminales distintos a hotel, reapuntamos tras cancelar
        if (location !== "hotel") {
          setSelectedLocation(location);
          tripDestination = null;
          syncHotelDestRow();
        }
        return;
      }
      setSelectedLocation(location);
      tripDestination = null;
      syncHotelDestRow();
      const destNames = Object.entries(DESTINATION_LABELS)
        .filter(function(e) { return e[0] !== location; })
        .map(function(e) { return e[1]; })
        .join(", ");
      signupStatusEl.textContent = "Elige destino: " + destNames;
    }

    function submitSignupWithDestination(dest) {
      if (!dest || !selectedLocation) return;
      if (dest === selectedLocation) return; // origen = destino inválido
      tripDestination = dest;
      syncDestButtons();
      updateLegendCompact();
      updatePassengerDirectPreviewRoute(directionsServiceInstance, true);
      socket.emit("signup", { location: selectedLocation, destination: dest, people: partyCount });
      refreshPickupRoute();
      if (signedUp) {
        persistPassengerSignup(selectedLocation, partyCount, tripDestination);
        updateSignupStatus(selectedLocation, partyCount);
      }
    }

    function syncSignupPeople() {
      if (!signedUp || !selectedLocation || !tripDestination) return;
      socket.emit("signup", buildSignupPayload());
      updateSignupStatus(selectedLocation, partyCount);
      persistPassengerSignup(selectedLocation, partyCount, tripDestination);
    }

    function changePartyCount(next) {
      partyCount = Math.max(1, Math.min(MAX_SIGNUP_PEOPLE, next));
      updatePartyControls();
      syncSignupPeople();
    }

    function updatePartyControls() {
      partyCountEl.textContent = String(partyCount);
      partyMinusEl.disabled = partyCount <= 1;
      partyPlusEl.disabled = partyCount >= MAX_SIGNUP_PEOPLE;
    }

    function formatFlightLegSummary(leg, flightCode, suggestedLabel) {
      if (!leg) return "";
      const when = formatScheduleDateLabel(leg.date) + " " + leg.time;
      const termLabel = leg.terminalLabel || (leg.terminal ? "T" + String(leg.terminal).replace(/\D/g, "") : "");
      const term = termLabel ? " · " + termLabel : "";
      const other = leg.otherIata
        ? (leg.direction === "arrival" ? " desde " : " hacia ") +
          (leg.otherName || leg.otherIata) +
          " (" +
          leg.otherIata +
          ")"
        : "";
      const pickup =
        suggestedLabel && leg.direction === "arrival"
          ? " · recogida en " + suggestedLabel
          : suggestedLabel && leg.direction === "departure"
            ? " · salida desde hotel"
            : "";
      if (leg.direction === "arrival") {
        return (
          flightCode +
          " · llegada a Madrid-Barajas" +
          term +
          " · " +
          when +
          other +
          pickup
        );
      }
      return (
        flightCode +
        " · salida desde Madrid-Barajas" +
        term +
        " · " +
        when +
        other +
        pickup

    }

    function flightLookupErrorMessage(code) {
      if (code === "invalid-flight") return "Indica un código de vuelo válido (ej. IB872).";
      if (code === "flight-not-found") {
        return "No encontramos ese vuelo en Madrid en los próximos días. Revisa el código.";
      }
      if (code === "flight-not-madrid") {
        return "Ese vuelo no tiene salida ni llegada en Madrid-Barajas (MAD).";
      }
      if (code === "flight-lookup-unavailable") {
        return "Consulta de vuelos no configurada en el servidor (falta API de aerolíneas).";
      }
      if (code === "flight-lookup-unauthorized") {
        return "No se pudo consultar el vuelo (revisa AERODATABOX_RAPIDAPI_KEY o AVIATIONSTACK_API_KEY en el servidor).";
      }
      if (code === "flight-terminal-unknown") {
        return "No pudimos asignar terminal en Barajas para este vuelo.";
      }
      if (code === "flight-lookup-failed") return "No se pudo consultar el vuelo. Inténtalo de nuevo.";
      return "No se pudo consultar el vuelo.";
    }

    function requestFlightLookup() {
      if (!scheduleFlightEl) return;
      const code = scheduleFlightEl.value.trim();
      if (code.length < 3) {
        renderFlightPreview(null, "Escribe al menos 3 caracteres (ej. IB872).");
        return;
      }
      if (scheduleFlightPreviewEl) {
        scheduleFlightPreviewEl.hidden = false;
        scheduleFlightPreviewEl.className = "client-schedule-flight-preview is-loading";
        scheduleFlightPreviewEl.textContent = "Consultando vuelo…";
      }
      const url = "/api/flight-lookup?code=" + encodeURIComponent(code);
      fetch(url)
        .then(function(res) {
          return res.json().then(function(body) {
            return { ok: res.ok, body: body };
          });
        })
        .then(function(result) {
          if (result.ok && result.body && result.body.ok) {
            applyFlightLookupResult(result.body);
            return;
          }
          const err = (result.body && result.body.error) || "flight-lookup-failed";
          renderFlightPreview(null, flightLookupErrorMessage(err));
        })
        .catch(function() {
          renderFlightPreview(null, flightLookupErrorMessage("flight-lookup-failed"));
        });
    }

    let map;
