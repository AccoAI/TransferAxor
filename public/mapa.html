        <div class="legend-eta-title">VehÃ­culos â€” llegadas por parada, horario Madrid (Hotel â†’ T1 â†’ T2 â†’ T3 â†’ T4 â†’ Hotel)</div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito1"><span class="legend-dot vito1"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito 1</span><span class="legend-pax" id="pax1"></span><span class="legend-eta" id="eta1"></span></div><div class="legend-vehicle-status" id="status1"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito2"><span class="legend-dot vito2"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito 2</span><span class="legend-pax" id="pax2"></span><span class="legend-eta" id="eta2"></span></div><div class="legend-vehicle-status" id="status2"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito3"><span class="legend-dot vito3"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito 3</span><span class="legend-pax" id="pax3"></span><span class="legend-eta" id="eta3"></span></div><div class="legend-vehicle-status" id="status3"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito4"><span class="legend-dot vito4"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito 4</span><span class="legend-pax" id="pax4"></span><span class="legend-eta" id="eta4"></span></div><div class="legend-vehicle-status" id="status4"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-minibus"><span class="legend-dot minibus"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">MinibÃºs</span><span class="legend-pax" id="pax5"></span><span class="legend-eta" id="eta5"></span></div><div class="legend-vehicle-status" id="status5"></div></div></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // Hotel Axor Barajas, Calle Campezo 10, 28022 Madrid (coordenadas del hotel)
    const CAMPEZO = { lat: 40.447914, lng: -3.583004 };
    const CAMPEZO_STR = "Calle Campezo 10, 28022 Madrid";
    // Terminales Barajas (paradas con enlace Google Maps)
    const TERMINALES = [
      { lat: 40.46412, lng: -3.57045, name: "Terminal T1 Salidas", link: "https://maps.app.goo.gl/jewMDcD6YS92QkUMA" },
      { lat: 40.46817, lng: -3.56969, name: "Terminal T2 Barajas", link: "https://maps.app.goo.gl/EtAnKzxfKwGc2fyeA" },
      { lat: 40.47044, lng: -3.57117, name: "Terminal T3 Barajas", link: "https://maps.app.goo.gl/R91V3qW8t1vhRaMo6" },
      { lat: 40.49125, lng: -3.59314, name: "Terminal T4 Barajas", link: "https://maps.app.goo.gl/MaAdQak6kArn1Xod6" }
    ];

    const vehicleIds = ["vito1", "vito2", "vito3", "vito4", "minibus"];
    const colors = { vito1: "#f59e0b", vito2: "#10b981", vito3: "#8b5cf6", vito4: "#ec4899", minibus: "#ef4444" };
    const etaEl = { vito1: "eta1", vito2: "eta2", vito3: "eta3", vito4: "eta4", minibus: "eta5" };
    const paxEl = { vito1: "pax1", vito2: "pax2", vito3: "pax3", vito4: "pax4", minibus: "pax5" };
    const statusEl = { vito1: "status1", vito2: "status2", vito3: "status3", vito4: "status4", minibus: "status5" };
    const vehicleRowEl = { vito1: "vehicle-row-vito1", vito2: "vehicle-row-vito2", vito3: "vehicle-row-vito3", vito4: "vehicle-row-vito4", minibus: "vehicle-row-minibus" };
    const SIGNUP_LABELS = {
      hotel: "Hotel Campezo 10",
      t1: "Terminal T1",
      t2: "Terminal T2",
      t3: "Terminal T3",
      t4: "Terminal T4"
    };
    const LOCATION_TO_ROUTE_STOP = {
      hotel: "Hotel",
      t1: "T1",
      t2: "T2",
      t3: "T3",
      t4: "T4"
    };
    const MAX_SIGNUP_PEOPLE = 15;

    const socket = io();
    const signupStopEls = document.querySelectorAll(".client-signup-stop");
    const partyCountEl = document.getElementById("partyCount");
    const partyMinusEl = document.getElementById("partyMinus");
    const partyPlusEl = document.getElementById("partyPlus");
    const cancelSignupBtnEl = document.getElementById("cancelSignupBtn");
    const signupStatusEl = document.getElementById("signupStatus");
    const legendEl = document.getElementById("legend");
    const legendToggleEl = document.getElementById("legendToggle");
    const legendCompactEl = document.getElementById("legendCompact");
    let partyCount = 1;
    let signedUp = false;
    let selectedLocation = null;

    function setSelectedLocation(location) {
      selectedLocation = location || null;
      signupStopEls.forEach(function(btn) {
        btn.classList.toggle("active", btn.dataset.location === selectedLocation);
      });
    }

    function updateSignupStatus(location, people) {
      if (!location) {
        signupStatusEl.textContent = "";
        return;
      }
      const label = SIGNUP_LABELS[location] || location;
      signupStatusEl.textContent = people > 1
        ? "Apuntado en " + label + " (" + people + " personas)"
        : "Apuntado en " + label;
    }

    function submitSignup(location) {
      if (signedUp || !location) return;
      setSelectedLocation(location);
      socket.emit("signup", { location: location, people: partyCount });
    }

    function syncSignupPeople() {
      if (!signedUp || !selectedLocation) return;
      socket.emit("signup", { location: selectedLocation, people: partyCount });
      updateSignupStatus(selectedLocation, partyCount);
    }

    function changePartyCount(next) {
      partyCount = Math.max(1, Math.min(MAX_SIGNUP_PEOPLE, next));
      updatePartyControls();
      syncSignupPeople();
    }

    function updatePartyControls() {
      partyCountEl.textContent = String(partyCount);
      partyMinusEl.disabled = partyCount <= 1;
      partyPlusEl.disabled = partyCount >= MAX_SIGNUP_PEOPLE;
    }

    function setSignedUp(active, location, people) {
      signedUp = active;
      signupStopEls.forEach(function(btn) {
        btn.disabled = active;
      });
      cancelSignupBtnEl.hidden = !active;
      if (active && location) {
        setSelectedLocation(location);
        updateSignupStatus(location, people);
      } else {
        setSelectedLocation(null);
        updateSignupStatus(null, 0);
      }
      updateLegendCompact();
      lastPickupRouteOrigin = null;
      refreshPickupRoute();
    }

    partyMinusEl.addEventListener("click", function() {
      changePartyCount(partyCount - 1);
    });

    partyPlusEl.addEventListener("click", function() {
      changePartyCount(partyCount + 1);
    });

    signupStopEls.forEach(function(btn) {
      btn.addEventListener("click", function() {
        submitSignup(btn.dataset.location);
      });
    });

    cancelSignupBtnEl.addEventListener("click", function() {
      socket.emit("cancel-signup");
    });

    socket.on("signup-status", function(data) {
      const location = data && data.location;
      const people = data && data.people ? data.people : 1;
      if (location) {
        partyCount = people;
        updatePartyControls();
        setSignedUp(true, location, people);
      } else {
        setSignedUp(false, null, 0);
        updatePartyControls();
      }
    });

    updatePartyControls();

    function setLegendSheetExpanded(open) {
      if (!legendEl || !legendToggleEl) return;
      legendEl.classList.toggle("legend-sheet-expanded", open);
      legendToggleEl.setAttribute("aria-expanded", open ? "true" : "false");
      scheduleFitRouteViewport();
    }

    if (legendToggleEl && legendEl) {
      legendToggleEl.addEventListener("click", function() {
        setLegendSheetExpanded(!legendEl.classList.contains("legend-sheet-expanded"));
      });
    }

    function formatMinutesDelta(seconds) {
      if (!Number.isFinite(seconds)) return "â€”";
      if (seconds <= 0) return "ahora";
      const minutes = Math.max(1, Math.round(seconds / 60));
      return minutes + " min";
    }

    function getDestinationStopName() {
      if (signedUp && selectedLocation) return LOCATION_TO_ROUTE_STOP[selectedLocation] || null;
      return null;
    }

    function computeEtaSecondsToStop(currentLeg, remainingOnLegSec, departureWaitSec, stopName) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 5) return null;
      const targetIdx = ROUTE_STOP_NAMES.indexOf(stopName);
      if (targetIdx < 0) return null;
      const start = currentLeg < 0 ? 0 : currentLeg;
      if (targetIdx < start) return null;
      let sec = departureWaitSec || 0;
      if (currentLeg < 0) {
        for (let i = 0; i <= targetIdx; i++) sec += routeLegDurationsSec[i];
        sec += targetIdx * PARADA_TERMINAL_MIN * 60;
      } else {
        sec += remainingOnLegSec;
        for (let i = currentLeg + 1; i <= targetIdx; i++) sec += routeLegDurationsSec[i];
        sec += (targetIdx - currentLeg) * PARADA_TERMINAL_MIN * 60;
      }
      return sec;
    }

    function getStopEtaSecondsRemaining(meta, stopName) {
      if (!meta) return null;
      let baseSec = null;
      if (meta.stopEtas && meta.stopEtas.length) {
        const hit = meta.stopEtas.find(function(stop) { return stop.name === stopName; });
        if (hit) baseSec = hit.sec;
      }
      if (baseSec === null && meta.routeEtaContext) {
        baseSec = computeEtaSecondsToStop(
          meta.routeEtaContext.currentLeg,
          meta.routeEtaContext.remainingOnLegSec,
          meta.routeEtaContext.departureWaitSec,
          stopName
        );
      }
      if (baseSec === null) return null;
      const elapsed = (Date.now() - (meta.stopEtasAt || Date.now())) / 1000;
      return Math.max(0, baseSec - elapsed);
    }

    function updateLegendCompact() {
      if (!legendCompactEl) return;
      const destination = getDestinationStopName();
      const vehicleId = activeVehicleIdOnMap;
      if (!destination) {
        legendCompactEl.textContent = "ApÃºntate para ver tu llegada";
        return;
      }
      if (!vehicleId) {
        legendCompactEl.textContent = "Sin transfer activo";
        return;
      }
      const meta = vehicleMeta[vehicleId] || {};
      const remaining = getStopEtaSecondsRemaining(meta, destination);
      if (remaining === null) {
        legendCompactEl.textContent = "Calculandoâ€¦";
        return;
      }
      const label = SIGNUP_LABELS[selectedLocation] || destination;
      const vehicleLabel = meta.label || vehicleId;
      legendCompactEl.textContent = vehicleLabel + " Â· " + label + " en " + formatMinutesDelta(remaining);
    }

    setInterval(updateLegendCompact, 10000);

    let map;
    let directionsRenderer;
    let pickupDirectionsRenderer = null;
    let directionsServiceInstance = null;
    let lastPickupRouteOrigin = null;
    const PICKUP_ROUTE_THROTTLE_KM = 0.25;
    const vehicleMarkers = {};
    const vehicleMeta = {};
    const stopPoints = [];
    var lastVehiclesLive = {};
    var activeVehicleIdOnMap = null;
    var lastActiveVehicleEta = null;
    // Duraciones de cada tramo del circuito (segundos), rellenado cuando carga la ruta: [Hotelâ†’T1, T1â†’T2, T2â†’T3, T3â†’T4, T4â†’Hotel]
    let routeLegDurationsSec = null;
    const PARADA_TERMINAL_MIN = 4;
    const ROUTE_STOP_NAMES = ["T1", "T2", "T3", "T4", "Hotel"];
    const MADRID_TZ = "Europe/Madrid";

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    // Ãšltima posiciÃ³n con la que pedimos ETA a Google (para no abusar de la API)
    const lastEtaOrigin = {};
    const ETA_THROTTLE_KM = 0.3;

    // Salidas cada 30 min (en punto y en y media).
    // Si atHotel: en los primeros minutos tras :00 o :30 â†’ "salida inminente" a esa hora; si no, prÃ³xima salida.
    // Si !atHotel: siempre la prÃ³xima salida (ej. a las 10:00 fuera del hotel â†’ 10:30).
    function pad2(n) {
      return (n < 10 ? "0" : "") + n;
    }

    function madridClockParts(date) {
      const parts = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date || new Date());
      const pick = function(type) {
        return parseInt(parts.find(function(p) { return p.type === type; }).value, 10);
      };
      return { hour: pick("hour"), minute: pick("minute") };
    }

    function formatArrivalTimeMadrid(secondsFromNow) {
      return new Date(Date.now() + secondsFromNow * 1000).toLocaleTimeString("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getDepartureDisplay(atHotel) {
      const clock = madridClockParts(new Date());
      const hour = clock.hour;
      const min = clock.minute;
      if (atHotel) {
        if (min < 5) return { imminent: true, time: pad2(hour) + ":00" };
        if (min >= 30 && min < 35) return { imminent: true, time: pad2(hour) + ":30" };
      }
      if (min < 30) return { imminent: false, time: pad2(hour) + ":30" };
      return { imminent: false, time: pad2((hour + 1) % 24) + ":00" };
    }

    function getSecondsUntilDeparture() {
      const dep = getDepartureDisplay(true);
      if (dep.imminent) return 0;
      const target = dep.time.split(":").map(Number);
      const now = Date.now();
      for (let delta = 0; delta <= 24 * 3600 * 1000; delta += 1000) {
        const instant = new Date(now + delta);
        const clock = madridClockParts(instant);
        if (clock.hour === target[0] && clock.minute === target[1]) {
          return Math.max(0, Math.round(delta / 1000));
        }
      }
      return 0;
    }

    function locationKeyToStopIndex(locationKey) {
      if (locationKey === "hotel") return 4;
      const indexByLocation = { t1: 0, t2: 1, t3: 2, t4: 3 };
      return indexByLocation[locationKey] !== undefined ? indexByLocation[locationKey] : null;
    }

    function getStopLatLng(stopIndex) {
      if (stopIndex === 4) return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
      return { lat: TERMINALES[stopIndex].lat, lng: TERMINALES[stopIndex].lng };
    }

    function getSignupDestinationPosition() {
      if (!signedUp || !selectedLocation) return null;
      const stopIndex = locationKeyToStopIndex(selectedLocation);
      if (stopIndex === null) return null;
      return getStopLatLng(stopIndex);
    }

    function buildCircuitWaypoints(currentLeg, destinationStopIndex) {
      const waypoints = [];
      if (currentLeg < 0) {
        for (let i = 0; i < destinationStopIndex; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
        return waypoints;
      }
      if (destinationStopIndex > currentLeg) {
        for (let i = currentLeg; i < destinationStopIndex; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
        return waypoints;
      }
      if (destinationStopIndex < currentLeg) {
        for (let i = currentLeg; i <= 4; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
        for (let i = 0; i < destinationStopIndex; i++) {
          waypoints.push({ location: getStopLatLng(i), stopover: true });
        }
      }
      return waypoints;
    }

    function clearPickupRoute() {
      if (pickupDirectionsRenderer) pickupDirectionsRenderer.setMap(null);
      lastPickupRouteOrigin = null;
    }

    function updatePickupRoute(lat, lng, directionsService) {
      const destination = getSignupDestinationPosition();
      if (!destination || !signedUp || !directionsService || !map) {
        clearPickupRoute();
        return;
      }
      const routeKey = selectedLocation;
      const last = lastPickupRouteOrigin;
      if (last && last.key === routeKey && distanceKm(lat, lng, last.lat, last.lng) < PICKUP_ROUTE_THROTTLE_KM) return;

      const currentLeg = getCurrentLegIndex(lat, lng);
      const destinationStopIndex = locationKeyToStopIndex(selectedLocation);
      if (destinationStopIndex === null) {
        clearPickupRoute();
        return;
      }
      const waypoints = buildCircuitWaypoints(currentLeg, destinationStopIndex);
      lastPickupRouteOrigin = { lat: lat, lng: lng, key: routeKey };

      directionsService.route({
        origin: { lat: lat, lng: lng },
        destination: destination,
        waypoints: waypoints,
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status !== google.maps.DirectionsStatus.OK) {
          clearPickupRoute();
          return;
        }
        if (!signedUp || selectedLocation !== routeKey) return;
        if (!pickupDirectionsRenderer) {
          pickupDirectionsRenderer = new google.maps.DirectionsRenderer({
            map: map,
            suppressMarkers: true,
            preserveViewport: true,
            polylineOptions: {
              strokeColor: "#0b3d91",
              strokeOpacity: 0.95,
              strokeWeight: 7,
              zIndex: 3
            }
          });
        } else {
          pickupDirectionsRenderer.setMap(map);
        }
        pickupDirectionsRenderer.setDirections(result);
      });
    }

    function refreshPickupRoute() {
      if (!lastActiveVehicleEta || !directionsServiceInstance) {
        clearPickupRoute();
        return;
      }
      updatePickupRoute(
        lastActiveVehicleEta.lat,
        lastActiveVehicleEta.lng,
        directionsServiceInstance
      );
    }

    // Puntos finales de cada tramo: leg 0â†’T1, 1â†’T2, 2â†’T3, 3â†’T4, 4â†’Hotel
    function getEndOfLeg(legIndex) {
      if (legIndex < 4) return { lat: TERMINALES[legIndex].lat, lng: TERMINALES[legIndex].lng };
      return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
    }

    // Devuelve en quÃ© tramo del circuito estÃ¡ el vehÃ­culo (0=Hotelâ†’T1, 1=T1â†’T2, ..., 4=T4â†’Hotel). -1 si estÃ¡ en el hotel.
    function getCurrentLegIndex(lat, lng) {
      const dHotel = distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng);
      if (dHotel < 0.15) return -1;
      const d = [
        distanceKm(lat, lng, TERMINALES[0].lat, TERMINALES[0].lng),
        distanceKm(lat, lng, TERMINALES[1].lat, TERMINALES[1].lng),
        distanceKm(lat, lng, TERMINALES[2].lat, TERMINALES[2].lng),
        distanceKm(lat, lng, TERMINALES[3].lat, TERMINALES[3].lng)
      ];
      const iMin = d.indexOf(Math.min.apply(null, d));
      const distToHotel = dHotel;
      if (distToHotel <= d[0] && distToHotel <= d[1] && distToHotel <= d[2] && distToHotel <= d[3]) return 4;
      if (iMin === 0) return distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng) <= d[1] ? 0 : 1;
      if (iMin === 1) return d[0] <= d[2] ? 1 : 2;
      if (iMin === 2) return d[1] <= d[3] ? 2 : 3;
      return d[2] <= distToHotel ? 3 : 4;
    }

    function computeStopEtas(currentLeg, remainingOnLegSec, departureWaitSec) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 5) return null;
      const etas = [];
      const start = currentLeg < 0 ? 0 : currentLeg;
      for (let s = start; s < 5; s++) {
        let sec = departureWaitSec || 0;
        if (currentLeg < 0) {
          for (let i = 0; i <= s; i++) sec += routeLegDurationsSec[i];
          sec += s * PARADA_TERMINAL_MIN * 60;
        } else {
          sec += remainingOnLegSec;
          for (let i = currentLeg + 1; i <= s; i++) sec += routeLegDurationsSec[i];
          sec += (s - currentLeg) * PARADA_TERMINAL_MIN * 60;
        }
        etas.push({ name: ROUTE_STOP_NAMES[s], sec: sec, text: formatArrivalTimeMadrid(sec) });
      }
      return etas;
    }

    function formatEtasDisplay(stopEtas, depInfo) {
      if (!stopEtas || !stopEtas.length) return { summary: "â€”", detail: "" };
      const next = stopEtas[0];
      const summary = "Siguiente: " + next.name + " Â· llegada " + next.text;
      const lines = stopEtas.map(function(stop) { return stop.name + ": " + stop.text; });
      if (depInfo) {
        lines.unshift((depInfo.imminent ? "Salida inminente " : "Salida ") + depInfo.time);
      }
      return { summary: summary, detail: lines.join("\n") };
    }

    function applyRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, departureWaitSec, depInfo) {
      const stopEtas = computeStopEtas(currentLeg, remainingOnLegSec, departureWaitSec);
      const meta = vehicleMeta[vehicleId] || {};
      meta.stopEtas = stopEtas;
      meta.stopEtasAt = Date.now();
      meta.routeEtaContext = {
        currentLeg: currentLeg,
        remainingOnLegSec: remainingOnLegSec,
        departureWaitSec: departureWaitSec || 0
      };
      vehicleMeta[vehicleId] = meta;
      const display = formatEtasDisplay(stopEtas, depInfo);
      setEtaForVehicle(vehicleId, label, {
        summary: display.summary,
        detail: display.detail,
        stopEtas: stopEtas
      });
    }

    function refreshActiveVehicleEta(directionsService) {
      if (!lastActiveVehicleEta || !directionsService) return;
      updateEtaFromGoogle(
        lastActiveVehicleEta.id,
        lastActiveVehicleEta.lat,
        lastActiveVehicleEta.lng,
        lastActiveVehicleEta.label,
        directionsService
      );
    }

    function updateEtaFromGoogle(vehicleId, lat, lng, label, directionsService) {
      const currentLeg = getCurrentLegIndex(lat, lng);
      if (currentLeg < 0) {
        if (!routeLegDurationsSec || routeLegDurationsSec.length !== 5) {
          setEtaForVehicle(vehicleId, label, { summary: "Calculandoâ€¦", detail: "" });
          return;
        }
        const dep = getDepartureDisplay(true);
        applyRouteEtas(vehicleId, label, -1, 0, getSecondsUntilDeparture(), dep);
        return;
      }
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 5) {
        setEtaForVehicle(vehicleId, label, { summary: "Calculandoâ€¦", detail: "" });
        return;
      }
      const last = lastEtaOrigin[vehicleId];
      if (last && distanceKm(lat, lng, last.lat, last.lng) < ETA_THROTTLE_KM) return;
      lastEtaOrigin[vehicleId] = { lat: lat, lng: lng };
      setEtaForVehicle(vehicleId, label, { summary: "Calculandoâ€¦", detail: "" });

      const endPoint = getEndOfLeg(currentLeg);
      directionsService.route({
        origin: { lat: lat, lng: lng },
        destination: endPoint,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status !== google.maps.DirectionsStatus.OK) {
          if (vehicleId === activeVehicleIdOnMap) setEtaForVehicle(vehicleId, label, { summary: "â€”", detail: "" });
          return;
        }
        if (vehicleId !== activeVehicleIdOnMap) return;
        const remainingOnLegSec = result.routes[0].legs[0].duration.value;
        applyRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, 0, null);
      });
    }

    function setVehicleRowActive(vehicleId) {
      vehicleIds.forEach(function(id) {
        const row = document.getElementById(vehicleRowEl[id]);
        if (row) row.classList.toggle("legend-vehicle-row-active", id === vehicleId);
      });
      updateLegendCompact();
    }

    function setPaxForVehicle(vehicleId, passengers, capacity, isActive) {
      const meta = vehicleMeta[vehicleId] || {};
      meta.passengers = passengers || 0;
      meta.capacity = capacity || 8;
      vehicleMeta[vehicleId] = meta;
      const paxNode = document.getElementById(paxEl[vehicleId]);
      if (paxNode) paxNode.textContent = isActive ? ("A bordo " + meta.passengers + "/" + meta.capacity) : "A bordo â€”";
      if (vehicleMarkers[vehicleId]) {
        const label = meta.label || vehicleId;
        vehicleMarkers[vehicleId].setTitle(label + " Â· A bordo " + meta.passengers + "/" + meta.capacity);
      }
    }

    function setEtaForVehicle(vehicleId, label, eta) {
      const meta = vehicleMeta[vehicleId] || {};
      meta.label = label;
      if (eta && eta.stopEtas) {
        meta.stopEtas = eta.stopEtas;
        meta.stopEtasAt = Date.now();
      }
      vehicleMeta[vehicleId] = meta;
      const el = document.getElementById(etaEl[vehicleId]);
      if (el) el.textContent = eta.summary || "â€”";
      const statusNode = document.getElementById(statusEl[vehicleId]);
      if (statusNode) statusNode.textContent = eta.detail || "";
      if (vehicleId === activeVehicleIdOnMap) updateLegendCompact();
    }

    function createVehicleIcon(vehicleId) {
      const c = colors[vehicleId] || "#888";
      return {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: c,
        fillOpacity: 1,
        strokeColor: "#fff",
        strokeWeight: 3
      };
    }

    let routeBounds = null;
    let routeFitTimer = null;

    function buildRouteBounds(directionsResult) {
      const bounds = new google.maps.LatLngBounds();
      bounds.extend(CAMPEZO);
      TERMINALES.forEach(function(t) {
        bounds.extend({ lat: t.lat, lng: t.lng });
      });
      if (directionsResult && directionsResult.routes[0]) {
        const route = directionsResult.routes[0];
        if (route.overview_path) {
          route.overview_path.forEach(function(point) {
            bounds.extend(point);
          });
        }
        route.legs.forEach(function(leg) {
          bounds.extend(leg.start_location);
          bounds.extend(leg.end_location);
        });
      }
      return bounds;
    }

    function getMapViewportPadding() {
      const header = document.querySelector(".map-header");
      const signup = document.getElementById("clientSignup");
      const legend = document.getElementById("legend");
      return {
        top: (header ? header.offsetHeight : 48) + (signup ? signup.offsetHeight : 112) + 20,
        right: 28,
        bottom: (legend ? legend.offsetHeight : 84) + 36,
        left: 28
      };
    }

    function fitRouteViewport(directionsResult) {
      if (!map) return;
      if (directionsResult) routeBounds = buildRouteBounds(directionsResult);
      if (!routeBounds) return;
      map.fitBounds(routeBounds, getMapViewportPadding());
    }

    function scheduleFitRouteViewport(directionsResult) {
      if (routeFitTimer) clearTimeout(routeFitTimer);
      requestAnimationFrame(function() {
        fitRouteViewport(directionsResult);
        if (map) google.maps.event.trigger(map, "resize");
        routeFitTimer = setTimeout(function() {
          fitRouteViewport();
        }, 250);
      });
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 40.465, lng: -3.58 },
        zoom: 11,
        mapTypeControl: false,
        fullscreenControl: false,
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", stylers: [{ visibility: "off" }] }
        ]
      });

      directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#6a8fc7",
          strokeOpacity: 0.35,
          strokeWeight: 4,
          zIndex: 1
        }
      });

      // Ruta circular: Campezo 10 â†’ T1 â†’ T2 â†’ T3 â†’ T4 â†’ Campezo 10 (por carretera)
      const directionsService = new google.maps.DirectionsService();
      directionsServiceInstance = directionsService;
      const request = {
        origin: CAMPEZO_STR,
        destination: CAMPEZO_STR,
        waypoints: TERMINALES.map(function(t) { return { location: { lat: t.lat, lng: t.lng }, stopover: true }; }),
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      };

      directionsService.route(request, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK) {
          directionsRenderer.setDirections(result);
          routeLegDurationsSec = result.routes[0].legs.map(function(leg) { return leg.duration.value; });
          scheduleFitRouteViewport(result);
          refreshActiveVehicleEta(directionsService);
          refreshPickupRoute();
          updateLegendCompact();
        }
      });

      window.addEventListener("resize", function() {
        scheduleFitRouteViewport();
      });

      // Icono visible para paradas: cÃ­rculo con letra (hotel H, terminales T1â€“T4)
      function makeStopIcon(letter, color) {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><circle cx="18" cy="18" r="15" fill="' + (color || "#58a6ff") + '" stroke="#fff" stroke-width="2"/><text x="18" y="23" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">' + letter + '</text></svg>';
        return {
          url: "data:image/svg+xml," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(36, 36),
          anchor: new google.maps.Point(18, 18)
        };
      }
      const hotelMarker = new google.maps.Marker({
        map: map,
        position: CAMPEZO,
        title: "Hotel Axor Barajas - Calle Campezo 10",
        icon: makeStopIcon("H", "#58a6ff")
      });
      const hotelStop = {
        marker: hotelMarker,
        location: "hotel",
        title: "Hotel Axor Barajas - Calle Campezo 10",
        link: null
      };
      stopPoints.push(hotelStop);

      TERMINALES.forEach(function(t, i) {
        const num = i + 1;
        const m = new google.maps.Marker({
          map: map,
          position: { lat: t.lat, lng: t.lng },
          title: t.name,
          icon: makeStopIcon("T" + num, "#388bfd")
        });
        const stop = {
          marker: m,
          location: "t" + num,
          title: t.name,
          link: t.link
        };
        stopPoints.push(stop);
      });

      socket.on("vehicles", function(vehicles) {
        lastVehiclesLive = {};
        vehicleIds.forEach(function(id) { lastVehiclesLive[id] = false; });

        var activeOne = null;
        for (const [id, v] of Object.entries(vehicles)) {
          if (v.lastUpdate && !activeOne) activeOne = { id: id, v: v };
        }
        if (activeOne) lastVehiclesLive[activeOne.id] = true;
        activeVehicleIdOnMap = activeOne ? activeOne.id : null;
        if (!activeOne) {
          lastActiveVehicleEta = null;
          clearPickupRoute();
        }
        setVehicleRowActive(activeVehicleIdOnMap);

        var activeId = activeOne ? activeOne.id : null;
        vehicleIds.forEach(function(id) {
          var vehicle = vehicles[id];
          if (!vehicle) return;
          var label = vehicle.label || id;
          setPaxForVehicle(id, vehicle.passengers, vehicle.capacity, id === activeId);
          if (id !== activeId && vehicleMarkers[id]) {
            vehicleMarkers[id].setMap(null);
            vehicleMarkers[id] = null;
          }
          if (id !== activeId) setEtaForVehicle(id, label, { summary: "â€”", detail: "" });
        });

        if (activeOne) {
          var id = activeOne.id;
          var v = activeOne.v;
          var label = v.label || id;
          lastActiveVehicleEta = { id: id, lat: v.lat, lng: v.lng, label: label };
          var pos = { lat: v.lat, lng: v.lng };
          if (vehicleMarkers[id]) {
            vehicleMarkers[id].setPosition(pos);
          } else {
            vehicleMarkers[id] = new google.maps.Marker({
              map: map,
              position: pos,
              title: label,
              icon: createVehicleIcon(id),
              zIndex: 100
            });
          }
          setPaxForVehicle(id, v.passengers, v.capacity, true);
          updateEtaFromGoogle(id, v.lat, v.lng, label, directionsService);
          updatePickupRoute(v.lat, v.lng, directionsService);
        }
      });
    }
  </script>
</body>
</html>
