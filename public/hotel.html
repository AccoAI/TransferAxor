<body class="hotel-page map-page map-page-vertical">
  <script>
    (function() {
      function syncHotelPortraitLayout() {
        if (!document.body) return;
        var params = new URLSearchParams(window.location.search);
        var noRotate = params.get("noRotate") === "1" || params.get("layout") === "native";
        var landscapeViewport = !noRotate && window.innerWidth > window.innerHeight;
        document.documentElement.classList.toggle("hotel-rotated", landscapeViewport);
        document.body.classList.toggle("hotel-rotated-portrait", landscapeViewport);
        document.body.classList.toggle("hotel-native-portrait", !landscapeViewport);
        if (typeof window.notifyHotelLayoutChanged === "function") {
          window.notifyHotelLayoutChanged();
        }
      }
      window.syncHotelPortraitLayout = syncHotelPortraitLayout;
      syncHotelPortraitLayout();
      window.addEventListener("resize", syncHotelPortraitLayout);
      window.addEventListener("orientationchange", syncHotelPortraitLayout);
    })();
  </script>
  <div class="hotel-portrait-root" id="hotelPortraitRoot">
  <header class="map-header hotel-header">
    <img src="img/logo-axor.png" alt="Axor Hoteles" class="header-logo">

  <div class="map-container">
    <div id="map"></div>
    <div id="mapStatus" class="map-status-banner" hidden></div>
    <div class="legend display-board hotel-board" id="legend">
      <div class="legend-section">
        <div class="hotel-circuits-intro">
          <div class="hotel-circuit-line"><span class="hotel-circuit-swatch barajas"></span> Barajas: Hotel → T1 → T2 → T4 → Hotel</div>

        </div>

        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito1"><span class="legend-dot vito1"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito NJC</span><span class="legend-pax" id="pax1"></span><span class="legend-eta" id="eta1"></span></div><div class="legend-vehicle-status" id="status1"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito2"><span class="legend-dot vito2"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito LZD</span><span class="legend-pax" id="pax2"></span><span class="legend-eta" id="eta2"></span></div><div class="legend-vehicle-status" id="status2"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito3"><span class="legend-dot vito3"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito MMR</span><span class="legend-pax" id="pax3"></span><span class="legend-eta" id="eta3"></span></div><div class="legend-vehicle-status" id="status3"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-vito4"><span class="legend-dot vito4"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Vito MDX</span><span class="legend-pax" id="pax4"></span><span class="legend-eta" id="eta4"></span></div><div class="legend-vehicle-status" id="status4"></div></div></div>
        <div class="legend-item legend-vehicle-row" id="vehicle-row-minibus"><span class="legend-dot minibus"></span><div class="legend-vehicle-copy"><div class="legend-vehicle-main"><span class="legend-label">Minibus MSX</span><span class="legend-pax" id="pax5"></span><span class="legend-eta" id="eta5"></span></div><div class="legend-vehicle-status" id="status5"></div></div></div>
      </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const CAMPEZO = { lat: 40.4479297, lng: -3.5830589 };
    const CAMPEZO_STR = "Calle Campezo 4, 28022 Madrid";
    const TERMINALES = [
      { key: "t1", lat: 40.46412, lng: -3.57045, name: "Terminal T1 Salidas", link: "https://maps.app.goo.gl/jewMDcD6YS92QkUMA" },
      { key: "t2", lat: 40.46817, lng: -3.56969, name: "Terminal T2 Barajas", link: "https://maps.app.goo.gl/EtAnKzxfKwGc2fyeA" },
      { key: "t4", lat: 40.49125, lng: -3.59314, name: "Terminal T4 Barajas", link: "https://maps.app.goo.gl/MaAdQak6kArn1Xod6" }
    ];
    const IFEMA = { lat: 40.4643, lng: -3.6167, name: "IFEMA Madrid" };
    /** Distancia máx. (km) a la polilínea de un circuito para mostrar el transfer en TV. */
    const HOTEL_ROUTE_CORRIDOR_KM = 0.9;
    const CIRCUIT_BARAJAS = "barajas";
    const CIRCUIT_IFEMA = "ifema";
    const IFEMA_ROUTE_STOP_NAMES = ["IFEMA", "Hotel"];
    /** Cerca de una parada fija (hotel, T1–T4, IFEMA) cuenta como en ruta. */
    const HOTEL_STOP_NEAR_KM = 0.35;

    const vehicleIds = ["vito1", "vito2", "vito3", "vito4", "minibus"];
    const colors = { vito1: "#f59e0b", vito2: "#10b981", vito3: "#8b5cf6", vito4: "#ec4899", minibus: "#ef4444" };
    const etaEl = { vito1: "eta1", vito2: "eta2", vito3: "eta3", vito4: "eta4", minibus: "eta5" };
    const paxEl = { vito1: "pax1", vito2: "pax2", vito3: "pax3", vito4: "pax4", minibus: "pax5" };
    const statusEl = { vito1: "status1", vito2: "status2", vito3: "status3", vito4: "status4", minibus: "status5" };
    const vehicleRowEl = { vito1: "vehicle-row-vito1", vito2: "vehicle-row-vito2", vito3: "vehicle-row-vito3", vito4: "vehicle-row-vito4", minibus: "vehicle-row-minibus" };

    const socket = io();

    let map;
    let directionsRenderer;
    let ifemaDirectionsRenderer = null;
    let circuitPathPoints = [];
    let ifemaPathPoints = [];
    let ifemaLegDurationsSec = null;
    const vehicleMarkers = {};
    const vehicleMeta = {};
    const stopPoints = [];
    var lastVehiclesLive = {};
    var activeVehicleIdOnMap = null;
    var lastActiveVehicleEta = null;
    let routeLegDurationsSec = null;
    let routeT4ToHotelDriveSec = null;
    const PARADA_TERMINAL_MIN = 0;
    const ROUTE_STOP_NAMES = ["T1", "T2", "T4", "Hotel"];
    const MADRID_TZ = "Europe/Madrid";

    function getHotelReturnFromT4DriveSeconds() {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return 0;
      const circuit = routeLegDurationsSec[3];
      if (routeT4ToHotelDriveSec == null) return circuit;
      return Math.max(circuit, routeT4ToHotelDriveSec);
    }

    function fetchRouteT4ToHotelDrive(directionsService, onDone) {
      if (!directionsService || !TERMINALES || TERMINALES.length < 3) {
        if (typeof onDone === "function") onDone();
        return;
      }
      const t4 = TERMINALES[2];
      directionsService.route({
        origin: { lat: t4.lat, lng: t4.lng },
        destination: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK && result.routes[0] && result.routes[0].legs[0]) {
          routeT4ToHotelDriveSec = result.routes[0].legs[0].duration.value;
        }
        if (typeof onDone === "function") onDone();
      });
    }

    function distanceKm(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function distanceKmToSegment(px, py, x1, y1, x2, y2) {
      const latMid = (px + x1 + x2) / 3;
      const cosLat = Math.cos((latMid * Math.PI) / 180);
      const kx = 111.32 * cosLat;
      const ky = 110.57;
      const dx = (x2 - x1) * kx;
      const dy = (y2 - y1) * ky;
      const len2 = dx * dx + dy * dy;
      if (len2 < 1e-12) return distanceKm(px, py, x1, y1);
      const t = Math.max(0, Math.min(1, ((px - x1) * kx * dx + (py - y1) * ky * dy) / len2));
      return distanceKm(px, py, x1 + t * (x2 - x1), y1 + t * (y2 - y1));
    }

    function minDistanceKmToPath(lat, lng, pathPoints) {
      if (!pathPoints || pathPoints.length < 2) return Infinity;
      let min = Infinity;
      for (let i = 0; i < pathPoints.length - 1; i++) {
        const a = pathPoints[i];
        const b = pathPoints[i + 1];
        const d = distanceKmToSegment(lat, lng, a.lat, a.lng, b.lat, b.lng);
        if (d < min) min = d;
      }
      return min;
    }

    function extractPathFromDirectionsResult(result) {
      const pts = [];
      if (!result || !result.routes || !result.routes[0]) return pts;
      const route = result.routes[0];
      if (route.overview_path && route.overview_path.length) {
        route.overview_path.forEach(function(p) {
          pts.push({ lat: p.lat(), lng: p.lng() });
        });
        return pts;
      }
      route.legs.forEach(function(leg) {
        if (!leg.steps) return;
        leg.steps.forEach(function(step) {
          if (!step.path) return;
          step.path.forEach(function(p) {
            pts.push({ lat: p.lat(), lng: p.lng() });
          });
        });
      });
      return pts;
    }

    function isNearServiceStop(lat, lng) {
      if (distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng) <= HOTEL_STOP_NEAR_KM) return true;
      for (let i = 0; i < TERMINALES.length; i++) {
        const t = TERMINALES[i];
        if (distanceKm(lat, lng, t.lat, t.lng) <= HOTEL_STOP_NEAR_KM) return true;
      }
      if (distanceKm(lat, lng, IFEMA.lat, IFEMA.lng) <= HOTEL_STOP_NEAR_KM) return true;
      return false;
    }

    function pathCorridorDistanceKm(lat, lng, pathPoints) {
      if (!pathPoints || pathPoints.length < 2) return Infinity;
      return minDistanceKmToPath(lat, lng, pathPoints);
    }

    /** En uno de los dos circuitos: Barajas (T1–T4) o IFEMA (ida y vuelta). */
    function isVehicleOnServiceRoute(lat, lng) {
      if (!Number.isFinite(lat) || !Number.isFinite(lng)) return false;
      if (isNearServiceStop(lat, lng)) return true;
      if (pathCorridorDistanceKm(lat, lng, circuitPathPoints) <= HOTEL_ROUTE_CORRIDOR_KM) return true;
      if (pathCorridorDistanceKm(lat, lng, ifemaPathPoints) <= HOTEL_ROUTE_CORRIDOR_KM) return true;
      return false;
    }

    /** Circuito activo según posición GPS (en hotel se usa modo conductor). */
    function detectVehicleCircuitKind(vehicleId, lat, lng) {
      const dBar = pathCorridorDistanceKm(lat, lng, circuitPathPoints);
      const dIfe = pathCorridorDistanceKm(lat, lng, ifemaPathPoints);
      const onBar = dBar <= HOTEL_ROUTE_CORRIDOR_KM;
      const onIfe = dIfe <= HOTEL_ROUTE_CORRIDOR_KM;
      if (!onBar && !onIfe) return null;
      if (onBar && onIfe) {
        if (distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng) <= HOTEL_STOP_NEAR_KM) {
          const svc = getVehicleService(vehicleId);
          return svc.serviceMode === "adhoc" ? CIRCUIT_IFEMA : CIRCUIT_BARAJAS;
        }
        return dIfe < dBar ? CIRCUIT_IFEMA : CIRCUIT_BARAJAS;
      }
      if (onIfe) return CIRCUIT_IFEMA;
      return CIRCUIT_BARAJAS;
    }

    function circuitKindLabel(kind) {
      if (kind === CIRCUIT_IFEMA) return "Circuito IFEMA · Hotel → IFEMA → Hotel";
      return "Circuito Barajas · Hotel → T1 → T2 → T4 → Hotel";
    }

    function fetchRouteHotelIfemaCircuit(directionsService, onDone) {
      if (!directionsService) {
        if (typeof onDone === "function") onDone();
        return;
      }
      directionsService.route({
        origin: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        destination: { lat: CAMPEZO.lat, lng: CAMPEZO.lng },
        waypoints: [{ location: { lat: IFEMA.lat, lng: IFEMA.lng }, stopover: true }],
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK && result.routes[0]) {
          ifemaPathPoints = extractPathFromDirectionsResult(result);
          ifemaLegDurationsSec = result.routes[0].legs.map(function(leg) { return leg.duration.value; });
          if (map && ifemaDirectionsRenderer) {
            ifemaDirectionsRenderer.setDirections(result);
          }
        }
        if (typeof onDone === "function") onDone();
      });
    }

    const lastEtaOrigin = {};
    const ETA_THROTTLE_KM = 0.3;
    var vehicleServiceById = {};

    function getVehicleService(vehicleId) {
      var s = vehicleServiceById[vehicleId];
      if (s && s.serviceMode) return s;
      return { serviceMode: "circuit", circuitSchedule: "A" };
    }

    /**
     * Ranuras :00 y :30 (Madrid): próxima salida del circuito desde el hotel (Campezo 4).
     */
    function madridSecondsSinceMidnight(date) {
      const parts = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      }).formatToParts(date || new Date());
      const pick = function(type) {
        return parseInt(parts.find(function(p) { return p.type === type; }).value, 10);
      };
      return pick("hour") * 3600 + pick("minute") * 60 + pick("second");
    }

    function snapUpToNextHalfHourMadrid(epochMs) {
      const s = madridSecondsSinceMidnight(new Date(epochMs));
      const boundarySec = Math.ceil(s / 1800) * 1800;
      return epochMs + (boundarySec - s) * 1000;
    }

    function getHotelArrivalSecOrchestratedFromHotel(departureWaitSec) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return null;
      const depWait = departureWaitSec || 0;
      const parSec = PARADA_TERMINAL_MIN * 60;
      let t4ArriveSec = depWait;
      for (let i = 0; i <= 2; i++) t4ArriveSec += routeLegDurationsSec[i];
      t4ArriveSec += 2 * parSec;
      const t4ArriveMs = Date.now() + t4ArriveSec * 1000;
      const hotelDepartMs = Date.now() + depWait * 1000;
      const minT4DepartMs = hotelDepartMs + 30 * 60 * 1000;
      const t4DepartMs = snapUpToNextHalfHourMadrid(Math.max(t4ArriveMs, minT4DepartMs));
      const driveSec = getHotelReturnFromT4DriveSeconds();
      return Math.max(0, (t4DepartMs - Date.now()) / 1000) + driveSec;
    }

    function getNextHotelOrchestratedDepartureInfo() {
      const now = Date.now();
      const s = madridSecondsSinceMidnight(new Date(now));
      const boundarySec = Math.ceil(s / 1800) * 1800;
      const deltaSec = Math.max(0, boundarySec - s);
      const imminent = deltaSec === 0;
      const nextInstant = new Date(now + deltaSec * 1000);
      const p = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(nextInstant);
      const pick = function(type) {
        return parseInt(p.find(function(x) { return x.type === type; }).value, 10);
      };
      const h = pick("hour");
      const m = pick("minute");
      return {
        imminent: imminent,
        time: pad2(h) + ":" + pad2(m),
        secondsUntil: deltaSec
      };
    }

    /** schedule ignorado: ranura combinada :00 y :30. */
    function getHotelDepartureDisplayCircuit(schedule) {
      const o = getNextHotelOrchestratedDepartureInfo();
      return { imminent: o.imminent, time: o.time };
    }

    function getSecondsUntilHotelDepartureCircuit(schedule) {
      return getNextHotelOrchestratedDepartureInfo().secondsUntil;
    }

    function pad2(n) {
      return (n < 10 ? "0" : "") + n;
    }

    function madridClockParts(date) {
      const parts = new Intl.DateTimeFormat("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit",
        hour12: false
      }).formatToParts(date || new Date());
      const pick = function(type) {
        return parseInt(parts.find(function(p) { return p.type === type; }).value, 10);
      };
      return { hour: pick("hour"), minute: pick("minute") };
    }

    function formatArrivalTimeMadrid(secondsFromNow) {
      return new Date(Date.now() + secondsFromNow * 1000).toLocaleTimeString("es-ES", {
        timeZone: MADRID_TZ,
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    // Tramos: leg 0→T1, 1→T2, 2→T4, 3→Hotel
    function getEndOfLeg(legIndex) {
      if (legIndex < 3) return { lat: TERMINALES[legIndex].lat, lng: TERMINALES[legIndex].lng };
      return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
    }

    // 0=Hotel→T1, 1=T1→T2, 2=T2→T4, 3=T4→Hotel, -1=en hotel
    function getCurrentLegIndex(lat, lng) {
      const dHotel = distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng);
      if (dHotel < 0.15) return -1;
      const d = [
        distanceKm(lat, lng, TERMINALES[0].lat, TERMINALES[0].lng),
        distanceKm(lat, lng, TERMINALES[1].lat, TERMINALES[1].lng),
        distanceKm(lat, lng, TERMINALES[2].lat, TERMINALES[2].lng)
      ];
      const iMin = d.indexOf(Math.min.apply(null, d));
      const distToHotel = dHotel;
      if (distToHotel <= d[0] && distToHotel <= d[1] && distToHotel <= d[2]) return 3;
      if (iMin === 0) return d[0] <= d[1] ? 0 : 1;
      if (iMin === 1) return d[0] <= d[2] ? 1 : 2;
      return d[1] <= distToHotel ? 2 : 3;
    }

    function computeStopEtas(currentLeg, remainingOnLegSec, departureWaitSec) {
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) return null;
      const etas = [];
      const start = currentLeg < 0 ? 0 : currentLeg;
      for (let s = start; s < 4; s++) {
        let sec = departureWaitSec || 0;
        if (currentLeg < 0) {
          if (s < 3) {
            for (let i = 0; i <= s; i++) sec += routeLegDurationsSec[i];
            sec += s * PARADA_TERMINAL_MIN * 60;
          } else {
            sec = getHotelArrivalSecOrchestratedFromHotel(departureWaitSec);
          }
        } else {
          sec += remainingOnLegSec;
          for (let i = currentLeg + 1; i <= s; i++) sec += routeLegDurationsSec[i];
          sec += (s - currentLeg) * PARADA_TERMINAL_MIN * 60;
        }
        etas.push({ name: ROUTE_STOP_NAMES[s], sec: sec, text: formatArrivalTimeMadrid(sec) });
      }
      return etas;
    }

    function formatEtasDisplay(stopEtas, depInfo, detailPrefix) {
      if (!stopEtas || !stopEtas.length) return { summary: "—", detail: "" };
      const next = stopEtas[0];
      const summary = "Siguiente: " + next.name + " · llegada " + next.text;
      const lines = stopEtas.map(function(stop) { return stop.name + ": " + stop.text; });
      if (depInfo) {
        if (depInfo.departFromHotel) {
          lines.unshift(
            depInfo.imminent
              ? "Salida inminente desde el hotel"
              : "Salida a las " + depInfo.time + " desde el hotel"
          );
        } else {
          lines.unshift((depInfo.imminent ? "Salida inminente " : "Salida ") + depInfo.time);
        }
      }
      if (detailPrefix) lines.unshift(detailPrefix);
      return { summary: summary, detail: lines.join("\n") };
    }

    function applyRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, departureWaitSec, depInfo, detailPrefix) {
      const stopEtas = computeStopEtas(currentLeg, remainingOnLegSec, departureWaitSec);
      const meta = vehicleMeta[vehicleId] || {};
      meta.stopEtas = stopEtas;
      meta.stopEtasAt = Date.now();
      meta.routeEtaContext = {
        currentLeg: currentLeg,
        remainingOnLegSec: remainingOnLegSec,
        departureWaitSec: departureWaitSec || 0
      };
      vehicleMeta[vehicleId] = meta;
      const display = formatEtasDisplay(stopEtas, depInfo, detailPrefix);
      setEtaForVehicle(vehicleId, label, {
        summary: display.summary,
        detail: display.detail,
        stopEtas: stopEtas
      });
    }

    function getIfemaCurrentLegIndex(lat, lng) {
      const dHotel = distanceKm(lat, lng, CAMPEZO.lat, CAMPEZO.lng);
      const dIfema = distanceKm(lat, lng, IFEMA.lat, IFEMA.lng);
      if (dHotel < HOTEL_STOP_NEAR_KM) return -1;
      if (dIfema < HOTEL_STOP_NEAR_KM) return 1;
      return dIfema <= dHotel ? 0 : 1;
    }

    function getIfemaEndOfLeg(legIndex) {
      if (legIndex === 0) return { lat: IFEMA.lat, lng: IFEMA.lng };
      return { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
    }

    function computeIfemaStopEtas(currentLeg, remainingOnLegSec) {
      if (!ifemaLegDurationsSec || ifemaLegDurationsSec.length !== 2) return null;
      const etas = [];
      const start = currentLeg < 0 ? 0 : currentLeg;
      for (let s = start; s < 2; s++) {
        let sec = 0;
        if (currentLeg < 0) {
          for (let i = 0; i <= s; i++) sec += ifemaLegDurationsSec[i];
        } else {
          sec = remainingOnLegSec;
          for (let i = currentLeg + 1; i <= s; i++) sec += ifemaLegDurationsSec[i];
        }
        etas.push({
          name: IFEMA_ROUTE_STOP_NAMES[s],
          sec: sec,
          text: formatArrivalTimeMadrid(sec)
        });
      }
      return etas;
    }

    function applyIfemaRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, detailPrefix) {
      const stopEtas = computeIfemaStopEtas(currentLeg, remainingOnLegSec);
      const prefix = detailPrefix || circuitKindLabel(CIRCUIT_IFEMA);
      const display = formatEtasDisplay(stopEtas, null, prefix);
      setEtaForVehicle(vehicleId, label, {
        summary: display.summary,
        detail: display.detail,
        stopEtas: stopEtas
      });
    }

    function updateEtaIfemaCircuit(vehicleId, lat, lng, label, directionsService) {
      const currentLeg = getIfemaCurrentLegIndex(lat, lng);
      if (currentLeg < 0) {
        if (!ifemaLegDurationsSec || ifemaLegDurationsSec.length !== 2) {
          setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: circuitKindLabel(CIRCUIT_IFEMA) });
          return;
        }
        applyIfemaRouteEtas(vehicleId, label, -1, 0, circuitKindLabel(CIRCUIT_IFEMA));
        return;
      }
      if (!ifemaLegDurationsSec || ifemaLegDurationsSec.length !== 2) {
        setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: circuitKindLabel(CIRCUIT_IFEMA) });
        return;
      }
      const last = lastEtaOrigin[vehicleId];
      if (last && distanceKm(lat, lng, last.lat, last.lng) < ETA_THROTTLE_KM) return;
      lastEtaOrigin[vehicleId] = { lat: lat, lng: lng };
      setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: circuitKindLabel(CIRCUIT_IFEMA) });

      const endPoint = getIfemaEndOfLeg(currentLeg);
      directionsService.route({
        origin: { lat: lat, lng: lng },
        destination: endPoint,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status !== google.maps.DirectionsStatus.OK) {
          if (vehicleId === activeVehicleIdOnMap) setEtaForVehicle(vehicleId, label, { summary: "—", detail: "" });
          return;
        }
        if (vehicleId !== activeVehicleIdOnMap) return;
        const remainingOnLegSec = result.routes[0].legs[0].duration.value;
        applyIfemaRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, circuitKindLabel(CIRCUIT_IFEMA));
      });
    }

    function refreshActiveVehicleEta(directionsService) {
      if (!lastActiveVehicleEta || !directionsService) return;
      updateEtaFromGoogle(
        lastActiveVehicleEta.id,
        lastActiveVehicleEta.lat,
        lastActiveVehicleEta.lng,
        lastActiveVehicleEta.label,
        directionsService
      );
    }

    function updateEtaFromGoogle(vehicleId, lat, lng, label, directionsService) {
      const circuitKind = detectVehicleCircuitKind(vehicleId, lat, lng);
      if (circuitKind === CIRCUIT_IFEMA) {
        updateEtaIfemaCircuit(vehicleId, lat, lng, label, directionsService);
        return;
      }

      const barajasPrefix = circuitKindLabel(CIRCUIT_BARAJAS);
      const currentLeg = getCurrentLegIndex(lat, lng);
      if (currentLeg < 0) {
        if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) {
          setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: barajasPrefix });
          return;
        }
        const svc = getVehicleService(vehicleId);
        if (svc.serviceMode === "adhoc") {
          setEtaForVehicle(vehicleId, label, {
            summary: "—",
            detail: "Fuera de circuito Barajas e IFEMA (simuladores, taller, apoyo…)"
          });
          return;
        }
        const sched = svc.circuitSchedule === "B" ? "B" : "A";
        const dep = getHotelDepartureDisplayCircuit(sched);
        const depLine = { imminent: dep.imminent, time: dep.time, departFromHotel: true };
        applyRouteEtas(
          vehicleId,
          label,
          -1,
          0,
          getSecondsUntilHotelDepartureCircuit(sched),
          depLine,
          barajasPrefix
        );
        return;
      }
      if (!routeLegDurationsSec || routeLegDurationsSec.length !== 4) {
        setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: barajasPrefix });
        return;
      }
      const last = lastEtaOrigin[vehicleId];
      if (last && distanceKm(lat, lng, last.lat, last.lng) < ETA_THROTTLE_KM) return;
      lastEtaOrigin[vehicleId] = { lat: lat, lng: lng };
      setEtaForVehicle(vehicleId, label, { summary: "Calculando…", detail: "" });

      const endPoint = getEndOfLeg(currentLeg);
      directionsService.route({
        origin: { lat: lat, lng: lng },
        destination: endPoint,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      }, function(result, status) {
        if (status !== google.maps.DirectionsStatus.OK) {
          if (vehicleId === activeVehicleIdOnMap) setEtaForVehicle(vehicleId, label, { summary: "—", detail: "" });
          return;
        }
        if (vehicleId !== activeVehicleIdOnMap) return;
        const remainingOnLegSec = result.routes[0].legs[0].duration.value;
        applyRouteEtas(vehicleId, label, currentLeg, remainingOnLegSec, 0, null, barajasPrefix);
      });
    }

    function setVehicleRowActive(vehicleId) {
      vehicleIds.forEach(function(id) {
        const row = document.getElementById(vehicleRowEl[id]);
        if (row) row.classList.toggle("legend-vehicle-row-active", id === vehicleId);
      });
    }

    function setVehicleRowDisplayMode(vehicleId, mode) {
      const row = document.getElementById(vehicleRowEl[vehicleId]);
      if (!row) return;
      row.classList.toggle("legend-vehicle-row-idle", mode === "idle");
      row.classList.toggle("legend-vehicle-row-live", mode === "live");
    }

    function setPaxForVehicle(vehicleId, passengers, capacity, isActive) {
      const meta = vehicleMeta[vehicleId] || {};
      meta.passengers = passengers || 0;
      meta.capacity = capacity || 8;
      vehicleMeta[vehicleId] = meta;
      const paxNode = document.getElementById(paxEl[vehicleId]);
      if (paxNode) {
        if (isActive) {
          paxNode.hidden = false;
          paxNode.textContent = "A bordo " + meta.passengers + "/" + meta.capacity;
        } else {
          paxNode.textContent = "";
          paxNode.hidden = true;
        }
      }
      if (vehicleMarkers[vehicleId]) {
        const label = meta.label || vehicleId;
        vehicleMarkers[vehicleId].setTitle(label + " · A bordo " + meta.passengers + "/" + meta.capacity);
      }
    }

    function setEtaForVehicle(vehicleId, label, eta) {
      const meta = vehicleMeta[vehicleId] || {};
      meta.label = label;
      if (eta && eta.stopEtas) {
        meta.stopEtas = eta.stopEtas;
        meta.stopEtasAt = Date.now();
      }
      vehicleMeta[vehicleId] = meta;
      const el = document.getElementById(etaEl[vehicleId]);
      if (el) el.textContent = eta.summary || "—";
      const statusNode = document.getElementById(statusEl[vehicleId]);
      if (statusNode) statusNode.textContent = eta.detail || "";
      if (vehicleId === activeVehicleIdOnMap && eta && eta.detail) {
        setVehicleRowDisplayMode(vehicleId, "live");
      } else if (eta && eta.summary === "Sin GPS") {
        setVehicleRowDisplayMode(vehicleId, "idle");
      } else {
        setVehicleRowDisplayMode(vehicleId, "");
      }
    }

    function createVehicleIcon(vehicleId) {
      const c = colors[vehicleId] || "#888";
      return {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 12,
        fillColor: c,
        fillOpacity: 1,
        strokeColor: "#fff",
        strokeWeight: 3
      };
    }

    let routeBounds = null;
    let routeFitTimer = null;

    function extendBoundsWithPath(bounds, pathPoints) {
      if (!pathPoints || !pathPoints.length) return;
      pathPoints.forEach(function(p) {
        bounds.extend(p);
      });
    }

    function buildRouteBounds(directionsResult) {
      const bounds = new google.maps.LatLngBounds();
      bounds.extend(CAMPEZO);
      bounds.extend(IFEMA);
      TERMINALES.forEach(function(t) {
        bounds.extend({ lat: t.lat, lng: t.lng });
      });
      if (directionsResult && directionsResult.routes[0]) {
        const route = directionsResult.routes[0];
        if (route.overview_path) {
          route.overview_path.forEach(function(point) {
            bounds.extend(point);
          });
        }
        route.legs.forEach(function(leg) {
          bounds.extend(leg.start_location);
          bounds.extend(leg.end_location);
        });
      }
      extendBoundsWithPath(bounds, circuitPathPoints);
      extendBoundsWithPath(bounds, ifemaPathPoints);
      return bounds;
    }

    function getMapViewportPadding() {
      const edge = 14;
      return { top: edge, right: edge, bottom: edge, left: edge };
    }

    function fitRouteViewport(directionsResult) {
      if (!map) return;
      if (directionsResult) routeBounds = buildRouteBounds(directionsResult);
      if (!routeBounds) return;
      map.fitBounds(routeBounds, getMapViewportPadding());
    }

    function scheduleFitRouteViewport(directionsResult) {
      if (routeFitTimer) clearTimeout(routeFitTimer);
      requestAnimationFrame(function() {
        fitRouteViewport(directionsResult);
        if (map) google.maps.event.trigger(map, "resize");
        routeFitTimer = setTimeout(function() {
          fitRouteViewport();
        }, 250);
      });
    }

    function initMap() {
      showHotelMapStatus("");
      map = new google.maps.Map(document.getElementById("map"), {
        center: { lat: 40.465, lng: -3.58 },
        zoom: 11,
        mapTypeControl: false,
        fullscreenControl: false,
        zoomControl: false,
        streetViewControl: false,
        rotateControl: false,
        styles: [
          { featureType: "poi", stylers: [{ visibility: "off" }] },
          { featureType: "transit", stylers: [{ visibility: "off" }] }
        ]
      });

      directionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#58a6ff",
          strokeOpacity: 0.9,
          strokeWeight: 6,
          zIndex: 1
        }
      });

      ifemaDirectionsRenderer = new google.maps.DirectionsRenderer({
        map: map,
        suppressMarkers: true,
        preserveViewport: true,
        polylineOptions: {
          strokeColor: "#a78bfa",
          strokeOpacity: 0.75,
          strokeWeight: 5,
          zIndex: 2
        }
      });

      const directionsService = new google.maps.DirectionsService();
      const hotelLatLng = { lat: CAMPEZO.lat, lng: CAMPEZO.lng };
      const request = {
        origin: hotelLatLng,
        destination: hotelLatLng,
        waypoints: TERMINALES.map(function(t) { return { location: { lat: t.lat, lng: t.lng }, stopover: true }; }),
        optimizeWaypoints: false,
        travelMode: google.maps.TravelMode.DRIVING,
        region: "es"
      };

      directionsService.route(request, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK) {
          directionsRenderer.setDirections(result);
          circuitPathPoints = extractPathFromDirectionsResult(result);
          routeLegDurationsSec = result.routes[0].legs.map(function(leg) { return leg.duration.value; });
          routeT4ToHotelDriveSec = null;
          scheduleFitRouteViewport(result);
          fetchRouteHotelIfemaCircuit(directionsService, function() {
            routeBounds = buildRouteBounds(result);
            scheduleFitRouteViewport(result);
            refreshActiveVehicleEta(directionsService);
          });
          refreshActiveVehicleEta(directionsService);
          fetchRouteT4ToHotelDrive(directionsService, function() {
            refreshActiveVehicleEta(directionsService);
          });
        }
      });

      window.addEventListener("resize", function() {
        scheduleFitRouteViewport();
      });

      function makeStopIcon(letter, color) {
        var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36"><circle cx="18" cy="18" r="15" fill="' + (color || "#58a6ff") + '" stroke="#fff" stroke-width="2"/><text x="18" y="23" text-anchor="middle" fill="#fff" font-size="16" font-weight="bold" font-family="sans-serif">' + letter + '</text></svg>';
        return {
          url: "data:image/svg+xml," + encodeURIComponent(svg),
          scaledSize: new google.maps.Size(36, 36),
          anchor: new google.maps.Point(18, 18)
        };
      }

      const hotelMarker = new google.maps.Marker({
        map: map,
        position: CAMPEZO,
        title: "Hotel Axor Barajas - Calle Campezo 4",
        icon: makeStopIcon("H", "#58a6ff")
      });
      stopPoints.push({
        marker: hotelMarker,
        location: "hotel",
        title: "Hotel Axor Barajas - Calle Campezo 4",
        link: null
      });

      TERMINALES.forEach(function(t) {
        const locKey = t.key;
        const iconLetter = locKey.charAt(0).toUpperCase() + locKey.slice(1);
        const m = new google.maps.Marker({
          map: map,
          position: { lat: t.lat, lng: t.lng },
          title: t.name,
          icon: makeStopIcon(iconLetter, "#388bfd")
        });
        stopPoints.push({
          marker: m,
          location: locKey,
          title: t.name,
          link: t.link
        });
      });

      new google.maps.Marker({
        map: map,
        position: { lat: IFEMA.lat, lng: IFEMA.lng },
        title: IFEMA.name,
        icon: makeStopIcon("IF", "#a78bfa")
      });

      socket.on("vehicles", function(vehicles) {
        lastVehiclesLive = {};
        vehicleIds.forEach(function(id) { lastVehiclesLive[id] = false; });

        vehicleIds.forEach(function(id) {
          var row = vehicles[id];
          if (!row) return;
          vehicleServiceById[id] = {
            serviceMode: row.serviceMode === "adhoc" ? "adhoc" : "circuit",
            circuitSchedule: row.serviceMode === "adhoc" ? null : (row.circuitSchedule === "B" ? "B" : "A")
          };
        });

        var onRouteCandidates = [];
        vehicleIds.forEach(function(id) {
          var v = vehicles[id];
          if (!v || !v.lastUpdate) return;
          if (!isVehicleOnServiceRoute(v.lat, v.lng)) return;
          onRouteCandidates.push({ id: id, v: v });
        });

        var activeOne = onRouteCandidates.length ? onRouteCandidates[0] : null;
        if (activeOne) lastVehiclesLive[activeOne.id] = true;
        activeVehicleIdOnMap = activeOne ? activeOne.id : null;
        if (!activeOne) lastActiveVehicleEta = null;
        setVehicleRowActive(activeVehicleIdOnMap);

        var activeId = activeOne ? activeOne.id : null;
        vehicleIds.forEach(function(id) {
          var vehicle = vehicles[id];
          if (!vehicle) return;
          var label = vehicle.label || id;
          var rowEl = document.getElementById(vehicleRowEl[id]);
          var hasGps = !!vehicle.lastUpdate;
          var onRoute = !hasGps || isVehicleOnServiceRoute(vehicle.lat, vehicle.lng);

          if (hasGps && !isVehicleOnServiceRoute(vehicle.lat, vehicle.lng)) {
            if (vehicleMarkers[id]) {
              vehicleMarkers[id].setMap(null);
              vehicleMarkers[id] = null;
            }
            if (rowEl) rowEl.hidden = true;
            return;
          }
          if (rowEl) rowEl.hidden = false;
          if (!hasGps) {
            setVehicleRowDisplayMode(id, "idle");
            setPaxForVehicle(id, vehicle.passengers, vehicle.capacity, false);
            setEtaForVehicle(id, label, { summary: "Sin GPS", detail: "" });
            return;
          }

          setPaxForVehicle(id, vehicle.passengers, vehicle.capacity, id === activeId);
          if (id !== activeId && vehicleMarkers[id]) {
            vehicleMarkers[id].setMap(null);
            vehicleMarkers[id] = null;
          }
          if (id !== activeId) {
            setVehicleRowDisplayMode(id, "");
            setEtaForVehicle(id, label, { summary: "—", detail: "" });
          }
        });

        if (activeOne) {
          var id = activeOne.id;
          var v = activeOne.v;
          var label = v.label || id;
          lastActiveVehicleEta = { id: id, lat: v.lat, lng: v.lng, label: label };
          var pos = { lat: v.lat, lng: v.lng };
          if (vehicleMarkers[id]) {
            vehicleMarkers[id].setPosition(pos);
            vehicleMarkers[id].setMap(map);
          } else {
            vehicleMarkers[id] = new google.maps.Marker({
              map: map,
              position: pos,
              title: label,
              icon: createVehicleIcon(id),
              zIndex: 100
            });
          }
          setPaxForVehicle(id, v.passengers, v.capacity, true);
          updateEtaFromGoogle(id, v.lat, v.lng, label, directionsService);
        } else {
          vehicleIds.forEach(function(id) {
            if (vehicleMarkers[id]) {
              vehicleMarkers[id].setMap(null);
              vehicleMarkers[id] = null;
            }
          });
        }
      });

      google.maps.event.addListenerOnce(map, "idle", function() {
        scheduleFitRouteViewport();
        if (typeof window.syncHotelPortraitLayout === "function") {
          window.syncHotelPortraitLayout();
        }
      });
    }

    function showHotelMapStatus(message) {
      var el = document.getElementById("mapStatus");
      if (!el) return;
      if (message) {
        el.textContent = message;
        el.hidden = false;
      } else {
        el.textContent = "";
        el.hidden = true;
      }
    }

    function loadHotelGoogleMaps() {
      var key = (typeof window.GOOGLE_MAPS_API_KEY !== "undefined" && window.GOOGLE_MAPS_API_KEY)
        ? window.GOOGLE_MAPS_API_KEY
        : "";
      if (!key || key === "YOUR_GOOGLE_MAPS_API_KEY") {
        showHotelMapStatus("Mapa no disponible: configura GOOGLE_MAPS_API_KEY en el servidor (Render) o en public/config.js.");
        return;
      }
      var s = document.createElement("script");
      s.src = "https://maps.googleapis.com/maps/api/js?key=" + encodeURIComponent(key) + "&callback=initMap&language=es&loading=async";
      s.async = true;
      s.onerror = function() {
        showHotelMapStatus("No se pudo cargar Google Maps. Comprueba la conexión a internet.");
      };
      document.head.appendChild(s);
    }

    window.initMap = initMap;
    window.gm_authFailure = function() {
      showHotelMapStatus("Clave de Google Maps rechazada. Revisa la API key y las restricciones de dominio en Google Cloud.");
    };

    window.notifyHotelLayoutChanged = function() {
      if (!map) return;
      setTimeout(function() {
        if (!map) return;
        google.maps.event.trigger(map, "resize");
        scheduleFitRouteViewport();
      }, 120);
    };

    loadHotelGoogleMaps();
  </script>
</body>
</html>
